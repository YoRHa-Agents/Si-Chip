title: Si-Chip
description: Persistent BasicAbility optimization factory - frozen spec v0.4.0 - first v2_tightened ship
version: 0.4.1

# No Jekyll built-in theme; we ship our own NieR: Automata-styled layout.

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  parse_block_html: true

permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - vendor
  - node_modules
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md

# Site-level navigation (used by header.html)
nav:
  - title: Home
    url: /
  - title: Install
    url: /install/
  - title: User Guide
    url: /userguide/
  - title: Architecture
    url: /architecture/
  - title: Demo
    url: /demo/
  - title: Spec
    url: https://github.com/YoRHa-Agents/Si-Chip/blob/main/.local/research/spec_v0.4.0.md
  - title: Source
    url: https://github.com/YoRHa-Agents/Si-Chip
