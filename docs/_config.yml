title: Si-Chip
description: Persistent BasicAbility optimization factory - frozen spec v0.1.0

# Use the GitHub Pages built-in Cayman theme (no remote_theme, no plugin install).
theme: jekyll-theme-cayman

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  parse_block_html: true

permalink: pretty

exclude:
  - vendor
  - node_modules
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md

# Site-level navigation (used by index.md links)
nav:
  - title: Home
    url: /
  - title: Install
    url: /install/
  - title: User Guide
    url: /userguide/
  - title: Architecture
    url: /architecture/
  - title: Demo
    url: /demo/
  - title: Spec (v0.1.0)
    url: https://github.com/YoRHa-Agents/Si-Chip/blob/main/.local/research/spec_v0.1.0.md
  - title: Source
    url: https://github.com/YoRHa-Agents/Si-Chip
