# Si-Chip Iteration-Delta Report Template
# Schema v0.3.0 (additive — v0.2.0 fields unchanged; spec v0.4.0-rc1 §18 + §20 add-on).
# Spec source: §8.2 evidence #6; §4 progressive-gate single-monotone rule.
# v0.3.0-rc1 §14.3 add-on: core_goal_check block — strict "MUST = 1.0" + no-regression rule.
# v0.3.0-rc1 §15.1/§15.2 add-on: round_kind enum + round_kind_iteration_delta_clause drive
#                                how §4.1 row 10 iteration_delta is interpreted this round.
# v0.4.0-rc1 §6.1 add-on: 8th efficiency axis `eager_token_delta` (breaks v0.1.0-v0.3.0
#                         byte-identicality on value_vector row count 7->8).
# v0.4.0-rc1 §18.6 add-on: optional `tier_transitions` block recording EAGER/ON-CALL/LAZY
#                          token movements introduced in code_change rounds.
# v0.4.0-rc1 §20.3 add-on: optional `promotion_state` top-level block tracking
#                          consecutive_passes / current_gate / promotable_to. Spec §20.3.
# Instance template (NOT a DevolaFlow WorkflowTemplate).
# Compares current round to the prior round and records whether at least one efficiency
# axis improved (§4.1 iteration_delta row: v1 >= +0.05, v2 >= +0.10, v3 >= +0.15).

$schema_version: "0.3.0"
$spec_section: "§8.2 evidence #6"
$spec_section_v0_3_0: "§8.2 + §14.3 + §15.2"
$spec_section_v0_4_0: "§8.2 + §14.3 + §15.2 + §6.1 + §18.6 + §20.3"
$source_of_truth: ".agents/skills/si-chip/"

metadata:
  name: "si-chip-iteration-delta-report"
  version: "0.3.0"
  description: "Round-over-round delta for MVP-8 metrics plus positive-axis verdict; adds §14 C0 check and §15 round_kind (v0.3.0-rc1); adds 8th axis eager_token_delta, tier_transitions, promotion_state (v0.4.0-rc1)."

# Guard-rail the single-monotone rule from §4.1 (threshold rows must remain monotone
# across v1_baseline -> v2_tightened -> v3_strict). Any instance must run this check
# before declaring verdict.pass_v1_baseline = true.
monotonicity_check_required: true

required_fields:
  - round_id
  - prior_round_id
  - computed_at
  - round_kind
  - round_kind_iteration_delta_clause
  - deltas
  - axis_status
  - core_goal_check
  - verdict

schema:
  round_id:
    type: string
    required: true
    description: "Current round id."
  prior_round_id:
    type: ["string", "null"]
    required: true
    description: "Prior round id or null if this is round 0."
  computed_at:
    type: string
    required: true
    format: "date-time"
  round_kind:
    type: string
    required: true
    enum:
      - code_change
      - measurement_only
      - ship_prep
      - maintenance
    description: "Spec v0.3.0-rc1 §15.1 — drives §15.2 iteration_delta clause interpretation and §15.4 promotion eligibility."
  round_kind_iteration_delta_clause:
    type: string
    required: true
    enum:
      - strict
      - monotonicity_only
      - waived
    description: "Spec v0.3.0-rc1 §15.2 — strict for code_change (>= 1 axis at gate bucket); monotonicity_only for measurement_only (no regression); waived for ship_prep and maintenance."
  deltas:
    type: object
    required: true
    description: "Per-dimension MVP-8 deltas (current - prior)."
    properties:
      task_quality:
        type: array
        required: true
        items: { type: string }
        description: "Metric keys reported for D1."
        expected:
          - T1
          - T2
          - T3
      context_economy:
        type: array
        required: true
        items: { type: string }
        description: "Metric keys reported for D2."
        expected:
          - C1
          - C4
      latency_path:
        type: array
        required: true
        items: { type: string }
        description: "Metric keys reported for D3."
        expected:
          - L2
      routing_cost:
        type: array
        required: true
        items: { type: string }
        description: "Metric keys reported for D6."
        expected:
          - R3
  axis_status:
    type: object
    required: true
    description: "Map of efficiency axis -> {positive_axis, delta}. §4.1 requires >= 1 axis positive at current gate bucket."
    properties:
      task_quality:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      context_economy:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      latency_path:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      generalizability:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      usage_cost:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      routing_cost:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
      governance_risk:
        type: object
        properties:
          positive_axis: { type: boolean }
          delta: { type: number }
  core_goal_check:
    type: object
    required: true
    description: |
      Spec v0.3.0-rc1 §14.3 block — strict "MUST = 1.0" + no-regression verdict for this round.
      Per §14: if c0_pass_rate < 1.0 OR c0_pass_rate_this_round < c0_pass_rate_prior_round,
      this round is FAILURE regardless of axis_status entries or pass_v1_baseline.
    properties:
      c0_pass_rate_this_round:
        type: number
        required: true
        description: "MUST be 1.0 per spec §14.3."
      c0_pass_rate_prior_round:
        type: number
        required: true
        description: "MUST be >= prior; any decrease = round failure (§14.3.2)."
      c0_no_regression:
        type: boolean
        required: true
        description: "true iff c0_pass_rate_this_round >= c0_pass_rate_prior_round."
      test_pack_path:
        type: string
        required: true
        description: "Repo-relative path to core_goal_test_pack.yaml (§14.2)."
      cases_run:
        type: integer
        required: true
        description: "Number of cases executed; >= 3 per §14.2 frozen constraint #1."
      cases_passed:
        type: integer
        required: true
        description: "Number of cases with expected_shape assertions satisfied."
      rollback_required:
        type: boolean
        required: true
        description: "true iff c0_no_regression == false; triggers REVERT-only round per §14.4."
      notes:
        type: string
        required: false
        description: "Optional human note explaining any rollback trigger or revision log."
  verdict:
    type: object
    required: true
    properties:
      pass_v1_baseline:
        type: boolean
        required: true
        description: "True only when §4.1 v1_baseline hard gates all pass AND at least one axis shows delta >= +0.05."
      blockers:
        type: array
        required: true
        items: { type: string }
        description: "List of metric-or-policy blockers preventing promotion; empty when pass=true."

# Thresholds pinned from spec §4.1 (source of truth); duplicated here as a sanity gate
# for implementations that read only this template.
gate_thresholds_ref:
  v1_baseline:
    iteration_delta_any_efficiency_axis: 0.05
  v2_tightened:
    iteration_delta_any_efficiency_axis: 0.10
  v3_strict:
    iteration_delta_any_efficiency_axis: 0.15

# Example skeleton.
example_instance:
  round_id: "r1"
  prior_round_id: "r0"
  computed_at: "2026-04-28T00:00:00Z"
  round_kind: code_change           # Spec v0.3.0-rc1 §15.1 enum: code_change | measurement_only | ship_prep | maintenance
  round_kind_iteration_delta_clause: strict   # Spec §15.2: strict | monotonicity_only | waived (per round_kind)
  deltas:
    task_quality: [T1, T2, T3]
    context_economy: [C1, C4]
    latency_path: [L2]
    routing_cost: [R3]
  axis_status:
    task_quality: { positive_axis: false, delta: 0.0 }
    context_economy: { positive_axis: true, delta: 0.06 }
    latency_path: { positive_axis: false, delta: 0.0 }
    generalizability: { positive_axis: false, delta: 0.0 }
    usage_cost: { positive_axis: false, delta: 0.0 }
    routing_cost: { positive_axis: false, delta: 0.0 }
    governance_risk: { positive_axis: false, delta: 0.0 }
    # v0.4.0 §6.1 8th axis — eager_token_delta
    eager_token_delta: { positive_axis: false, delta: 0.0, rationale: "No EAGER tier movement this round; if code_change later shifts prose from alwaysApply rule to SKILL.md ON-CALL body, report (C7_without - C7_with) / C7_without here." }
  core_goal_check:
    c0_pass_rate_this_round: 1.0   # MUST be 1.0 per spec §14.3
    c0_pass_rate_prior_round: 1.0  # MUST be >= prior; any decrease = round failure
    c0_no_regression: true
    test_pack_path: ".local/dogfood/<DATE>/abilities/<id>/core_goal_test_pack.yaml"
    cases_run: 0                   # >= 3 per §14.2
    cases_passed: 0
    rollback_required: false       # true if c0_no_regression == false; triggers REVERT-only round per §14.4
    notes: "Per spec §14: if c0_pass_rate < 1.0 OR c0_pass_rate_this_round < c0_pass_rate_prior_round, this round is FAILURE regardless of axis_status entries."
  verdict:
    pass_v1_baseline: true
    blockers: []

# v0.4.0 §18.6 add-on — tier_transitions block.
# Optional; populated when round_kind=code_change moves tokens between EAGER/ON-CALL/LAZY tiers.
# Schema: array of { from, to, tokens, reason, net_benefit } objects.
# net_benefit ∈ {positive, neutral, negative} per §18.6.1.
tier_transitions:
  # - from: EAGER
  #   to: ON-CALL
  #   tokens: 407
  #   reason: "Contract clauses 4-8 moved from alwaysApply rule to SKILL.md"
  #   net_benefit: "EAGER paid per session; ON-CALL paid per trigger. Beneficial if sessions/trigger > 1."

# v0.4.0 §20.3 add-on — promotion_state block.
# Top-level per §20.3; tracks consecutive_passes / current_gate / promotable_to.
# §15.4 eligibility: code_change + measurement_only rounds count; ship_prep + maintenance do not.
promotion_state:
  current_gate: v1_baseline                  # v1_baseline | v2_tightened | v3_strict
  consecutive_passes: 0                      # rounds in current gate that cleared all row-level thresholds
  promotable_to: null                        # v2_tightened after 2 consecutive v1 passes; v3_strict after 2 consecutive v2
  last_promotion_round_id: null              # round_id where most recent gate promotion happened
