        * pass_rate >= 0.82 (BOTH have 0.85; PASS)
        * pass_k >= 0.55 (BOTH have 0.5478; FAILS by -0.0022 — the known
          carry-forward blocker)
        * trigger_F1 >= 0.85 (BOTH have 0.8934; PASS)
        * near_miss_FP_rate <= 0.10 (BOTH have 0.05; PASS by margin)
        * metadata_tokens <= 100 (BOTH have <=85; PASS by margin)
