    notes: |
      Master plan Round 12 acceptance criterion #1+#2 require all 6
      triggers + the empty-trigger keep-state result.
      Round 11 master plan §6.4 prose includes all 6 triggers verbatim
      (carried byte-identical from v0.1.0 → v0.2.0-rc1; no Normative
