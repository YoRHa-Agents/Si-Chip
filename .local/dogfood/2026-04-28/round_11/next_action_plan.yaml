      Emit v0.2.0_ship_decision.yaml with verdict (SHIP_ELIGIBLE iff the
      v2_tightened readiness check is FULLY clean across BOTH rounds;
      otherwise SHIP_BLOCKED with the explicit blocker list).
    notes: |
      Per spec §4.2 promotion rule, v0.2.0 ship requires CONSECUTIVE TWO
      rounds passing every v2_tightened hard threshold. Round 11 +
      Round 12 are the two consecutive rounds. T2_pass_k = 0.5478 is the
