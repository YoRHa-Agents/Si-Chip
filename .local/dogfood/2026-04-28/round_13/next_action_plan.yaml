    title: 'Codex native SKILL.md runtime support (vs current bridge-only)'
    deferral_reason: |
      Spec §11.2 deferred. Currently Codex is bridge-only via AGENTS.md +
      .codex/profiles/si-chip.md + .codex/instructions/si-chip-bridge.md
      per §7.2 priority 3. Native SKILL.md runtime is a Codex platform
      change outside Si-Chip's control; revisit after Codex publishes
      a SKILL.md runtime spec.
    refer_to: 'spec §11.2'
  - id: plugin_distribution
    title: 'Plugin distribution (commands / hooks / marketplace upgrade)'
    deferral_reason: |
      Spec §11.1 forever-out for v0.x: marketplace + distribution surface
      are PERMANENTLY OUT for v0.x. Re-evaluation gated to spec bump
      v0.2.x -> v1.x AND continuous v3_strict pass for 2+ rounds.
    refer_to: 'spec §11.2 deferred items'

