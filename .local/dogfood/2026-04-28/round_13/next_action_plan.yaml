# Si-Chip Next-Action Plan — round_13 -> round_14 (POST-v0.2.0-SHIP / v0.3.0 candidates)
# Conforms to templates/next_action_plan.template.yaml (spec §8.1 step 4 / §8.2 evidence #5).
# Round 13 is the v0.2.0 SHIP-PREP REVERT-ONLY round per L0 PATH=REVERT_ONLY
# decision (PATH B in Round 12's v0.2.0_ship_decision.yaml). The v0.2.0 ship
# happens at gate=relaxed (= v1_baseline; same gate as v0.1.0 ship); the L0
# ship-commit step (subsequent to this dogfood round) bumps SKILL.md
# frontmatter 0.1.12 -> 0.2.0 + spec ref v0.2.0-rc1 -> v0.2.0 final.
#
# This next_action_plan PRE-SPECIFIES the v0.3.0 candidate actions (a1-a4)
# that L0 / future dogfood rounds should pick up AFTER the v0.2.0 ship tag.

round_id: round_14_or_v0_3_0_round_1  # next round may be v0.3.0 round 1 OR a v0.2.x maintenance round
generated_at: '2026-04-29T08:11:00+00:00'
basis_metrics_report: .local/dogfood/2026-04-28/round_13/metrics_report.yaml
basis_router_floor_report: .local/dogfood/2026-04-28/round_13/router_floor_report.yaml
prior_iteration_delta: .local/dogfood/2026-04-28/round_13/iteration_delta_report.yaml
target_gate: relaxed_until_real_llm_runner_lands  # spec §5.4: relaxed -> v1_baseline; v0.3.0 plan promotes to v2_tightened iff a1 lands AND real k=4 sampling clears 0.55

actions:
  - id: a1
    title: 'Implement evals/si-chip/runners/real_llm_runner.py (real-LLM evaluation; v0.3.0 must-have)'
    owner: Implement
    applies_to_metric: T2_pass_k                 # the carry-forward v2_tightened blocker since Round 1
    primitive: implement
    exit_criterion: |
      evals/si-chip/runners/real_llm_runner.py exists and EXECUTES against the
      6 case yaml files in evals/si-chip/cases/ via the canonical real-LLM
      eval harness (devolaflow.evaluators or anthropic.api SDK):
        * Per-case real k=4 sampling (4 independent draws per prompt with
          temperature > 0; pass_k = fraction with at least 1 of 4 passes).
        * Output shape mirrors with_ability_runner.run_case (per-prompt
          outcomes + per-case summary + ROUTING/BODY token counts).
        * Generates baselines under
          evals/si-chip/baselines/with_si_chip_real_llm/ + no_ability_real_llm/.
        * aggregate_eval.py picks up the new baselines naturally
          (back-compat with deterministic baselines).
      Acceptance: T2_pass_k from real k=4 sampling >= 0.55 on at least
      one case (so v2_tightened can clear; carry-forward blocker since
      Round 1 finally unblocked). pass_rate from real LLM is allowed to
      vary modestly (no strict >= 0.85 requirement; the simulator's 0.85
      is the deterministic ceiling, real LLM may sit 0.78-0.92).
    blocker_for_v0_3_0: true
    deferred_from_round_13_reason: |
      Round 13 sandbox lacks LLM API auth + outbound https. PATH A in
      Round 12's v0.2.0_ship_decision.yaml is deferred per L0 directive;
      v0.2.0 ships at gate=relaxed (v1_baseline) instead.
    prerequisites:
      - 'LLM API key (Anthropic or compatible)'
      - 'outbound HTTPS to api.anthropic.com (or compatible endpoint)'
      - 'devolaflow.evaluators OR anthropic SDK installed'
      - 'rate-limit budget (~ 6 cases × 20 prompts × 4 samples × 2 arms = 960 LLM calls per dogfood round; estimated cost $20-30 at Sonnet 4.6 prices)'
    notes: |
      Per spec §5: Si-Chip does NOT train router models. The real-LLM runner
      EVALUATES via existing models — no learned weights; no online learning.
      §11 forever-out compliance preserved. The runner replaces the
      deterministic SHA-256 simulator's pass_k_4 = pass_rate^4 PROXY with
      genuine k=4 sampling, naturally clearing the v2_tightened T2_pass_k
      blocker (typical real k=4 across 4 draws per prompt yields ~0.6-0.7
      pass_k for our case difficulty profile).

  - id: a2
    title: 'Fill G2/G3/G4 generalizability sub-metrics (D4 1/4 -> 4/4; v0.3.0 must-have)'
    owner: Implement
    applies_to_metric:
      - G2_cross_domain_transfer_pass
      - G3_OOD_robustness
      - G4_model_version_stability
    primitive: implement
    exit_criterion: |
      All 3 G2/G3/G4 sub-metrics populated in metrics_report.yaml from
      real-LLM runner outputs:
        * G2_cross_domain_transfer_pass: real-LLM run against a
          cross-domain prompt bank (evals/si-chip/cross_domain/ NEW) —
          measures how well the ability transfers to scenarios outside
          its training/seed domain. Range [0.0, 1.0].
        * G3_OOD_robustness: real-LLM run against the OOD robustness
          suite (evals/si-chip/ood_robustness/ NEW) — measures
          out-of-distribution prompt handling. Range [0.0, 1.0].
        * G4_model_version_stability: real-LLM run against multiple
          model versions (e.g., sonnet_4_5 vs sonnet_4_6 vs sonnet_4_7;
          composer_2_fast vs composer_2_default) and reports the
          worst-case pass_rate gap. Range [0.0, 1.0]; lower = more
          stable across versions.
      Tied to a1: requires the real-LLM runner from a1 to land first.
    deferred_from_round_13_reason: 'D4 fills require real-LLM runs which require the v0.3.0 real-LLM runner (a1 above).'
    prerequisites:
      - 'a1 (real-LLM runner) landed and producing baselines'
      - 'evals/si-chip/cross_domain/ + evals/si-chip/ood_robustness/ prompt yaml files authored (~50-100 prompts each)'
    notes: |
      D4 G1 was filled in Round 10 with a 2-model × 2-pack PARTIAL PROXY
      (carried byte-identical through Rounds 11-13). The full G1 also
      benefits from a1 (the 96-cell matrix is the authoritative G1).
      v2_tightened+ promotion ties G1 to the full 96-cell matrix per
      §5.3. After a1 + a2 + the full G1 fill, D4 reaches 4/4 populated
      (FULL COVERAGE).

  - id: a3
    title: 'Fill L5/L6/L7 latency-path sub-metrics (D3 4/7 -> 7/7; v0.3.0 must-have)'
    owner: Implement
    applies_to_metric:
      - L5_detour_index
      - L6_replanning_rate
      - L7_think_act_split
    primitive: implement
    exit_criterion: |
      All 3 L5/L6/L7 sub-metrics populated in metrics_report.yaml from
      real-LLM runner outputs:
        * L5_detour_index: ratio of off-path tool calls / total tool calls
          per task; measures wandering. Range [0.0, 1.0]; lower = more
          direct. Tied to per-tool-call instrumentation in real-LLM
          runner.
        * L6_replanning_rate: fraction of tasks where the agent
          backtracked / re-planned mid-execution. Range [0.0, 1.0].
        * L7_think_act_split: ratio of "thinking" tokens to "acting"
          tokens (act = tool calls + final answer). Range [0.0, +inf).
      Tied to a1: requires the real-LLM runner from a1 to land first.
    deferred_from_round_13_reason: 'D3 fills require real-LLM execution traces which require the v0.3.0 real-LLM runner (a1 above).'
    prerequisites:
      - 'a1 (real-LLM runner) landed and producing per-step traces'
      - 'OTel GenAI semconv emitted by the real-LLM runner (gen_ai.client.operation.duration / gen_ai.tool.name / mcp.method.name) — see spec §3.2 frozen constraint #3'
    notes: |
      D3 L1/L2/L3/L4 were filled in Round 4 with the deterministic
      simulator. The deterministic simulator emits unique prompt_ids per
      case (degenerate L4 = 0.0); L5/L6/L7 require genuine multi-step
      execution traces which the simulator does not produce. After a3,
      D3 reaches 7/7 populated (FULL COVERAGE).

  - id: a4
    title: 'Promote to v2_tightened gate after a1 lands (v0.3.0 ship gate)'
    owner: Verify
    applies_to_metric:                     # All v2_tightened hard threshold rows
      - T1_pass_rate
      - T2_pass_k
      - C1_metadata_tokens
      - C4_per_invocation_footprint
      - L2_wall_clock_p95
      - R3_trigger_F1
      - R4_near_miss_FP_rate
      - R6_routing_latency_p95
      - R7_routing_token_overhead
    primitive: verify
    exit_criterion: |
      Both v0.3.0 round_1 metrics_report.yaml AND v0.3.0 round_2
      metrics_report.yaml pass every v2_tightened hard threshold:
        * pass_rate >= 0.82
        * pass_k >= 0.55          # CRITICAL: requires a1 (real k=4 sampling)
        * trigger_F1 >= 0.85
        * near_miss_FP_rate <= 0.10
        * metadata_tokens <= 100
        * per_invocation_footprint <= 7000
        * wall_clock_p95 <= 30 s
        * routing_latency_p95 <= 1200 ms
        * routing_token_overhead <= 0.12
        * iteration_delta any axis >= +0.10  (v0.3.0 work itself satisfies — a1 is a major efficiency-axis win)
      Emit v0.3.0_ship_decision.yaml with verdict (SHIP_ELIGIBLE iff the
      v2_tightened readiness check is FULLY clean across BOTH v0.3.0
      rounds; otherwise SHIP_BLOCKED with the explicit blocker list).
    deferred_from_round_13_reason: 'v2_tightened promotion requires CONSECUTIVE TWO ROUNDS clearing every v2 threshold (spec §4.2). Round 11 (T2_pass_k -0.0022 + iteration_delta -0.05) and Round 12 (T2_pass_k -0.055; honest 7-case experiment) both failed; Round 13 reverts to Round 11 byte-identical (T2_pass_k -0.0022 still). v0.3.0 ship cycle picks this up after a1 lands.'
    notes: |
      Per spec §4.2 promotion rule, v0.3.0 ship at v2_tightened requires
      CONSECUTIVE TWO ROUNDS passing every v2_tightened hard threshold.
      v0.3.0 round_1 + round_2 are the two consecutive rounds. T2_pass_k
      = 0.5478 is the single known carry-forward blocker; a1 (real-LLM
      runner with real k=4 sampling) is the unblock path.

expected_iteration_delta_axes:
  - task_quality           # via a1 real-LLM runner: real k=4 sampling lifts T2_pass_k naturally; pass_rate may shift +/- 5%
  - latency_path           # via a3 L5/L6/L7 fills: 3 new sub-metrics measured first time
  - generalizability       # via a2 G2/G3/G4 fills: 3 new sub-metrics measured first time

# Pre-commitment: v0.3.0 round_1 + round_2 must show movement on at least one
# efficiency axis at the v2_tightened +0.10 bucket (per spec §4.1) AND every
# v2_tightened hard threshold passing across BOTH rounds to unblock v0.3.0
# ship.

