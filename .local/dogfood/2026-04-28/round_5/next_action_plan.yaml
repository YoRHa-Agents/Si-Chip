target_gate: relaxed  # spec §5.4: relaxed -> v1_baseline

actions:
  - id: a1
    title: Populate U3_setup_steps_count from install.sh dry-run instrumentation
    owner: Implement
    applies_to_metric: U3_setup_steps_count
    primitive: implement
    exit_criterion: 'U3_setup_steps_count non-null in round_6 metrics_report.yaml AND <= 2 (matches CHANGELOG v0.1.1 one-line installer claim)'
    notes: |
      Round 5 closes half of D5 (U1 + U2). Round 6 closes the remaining half
      by instrumenting install.sh to emit a structured telemetry log. U3
      counts the explicit user steps in the one-line installer flow:
      - 1 step if curl | bash completes without re-prompting (non-interactive)
      - 2 steps if TARGET / SCOPE prompts fire (interactive default)
      Add tools/install_telemetry.py that parses the `[OK] Installed ...`
      lines from install.sh stdout and emits U3 + U4 to
      .local/dogfood/<date>/round_6/raw/install_telemetry.json. The
      aggregator then hoists from that JSON.

      Dependencies: Round 6 MUST NOT regress existing install.sh flags
      (--target, --scope, --version, --dry-run, --yes, --force, --uninstall,
      --help, --version-info, --source-url, --repo-root, -y, -h). Regression
      test via install.sh --dry-run + --yes against synthetic file:// source.

  - id: a2
    title: Populate U4_time_to_first_success from installer wall-clock telemetry
    owner: Implement
    applies_to_metric: U4_time_to_first_success
    primitive: implement
    exit_criterion: 'U4_time_to_first_success non-null in round_6 metrics_report.yaml AND <= 60 s (sanity ceiling for one-line install)'
    notes: |
      U4 = wall time from `curl ... | bash` entry to the first `verify_install`
      success (count_tokens.py --file SKILL.md --both exiting 0). Record start
      timestamp at the top of install.sh main(); record success timestamp just
      after the post-install verify_install call. Telemetry JSON writes both
      + a computed duration_s. Master plan Round 6 risk_flag: U4 is subject
      to network latency; record p50 + p95 separately when variance is high.

      Implementation: tools/install_telemetry.py exposes
        - ITelemetryLog.from_stdout(stdout_text) -> parsed struct
        - compute_u3(log) -> int
        - compute_u4(log) -> float (seconds)
      Plus a CLI: `python tools/install_telemetry.py --log path.txt --json`.

  - id: a3
    title: Add unit tests for tools/install_telemetry.py
    owner: Test
    applies_to_metric: U3_setup_steps_count
    primitive: test
    exit_criterion: 'tools/install_telemetry.py has >= 10 unit tests; unittest discovers them; all pass.'
    notes: |
      Per workspace 'Mandatory Verification' rule. Cover:
      - happy path (interactive install with 2 prompts)
      - happy path (non-interactive with --target --scope --yes)
      - failure path (install.sh exits non-zero before verify_install)
      - duration parsing (ISO-8601 timestamps; negative durations rejected)
      - log-with-warnings path (--dry-run)
      - uninstall path (U3/U4 should surface as null, not 0)

  - id: a4
    title: Extend aggregate_eval.py to hoist U3 + U4 from install_telemetry.json
    owner: Implement
    applies_to_metric: U3_setup_steps_count
    primitive: implement
    exit_criterion: 'aggregate_eval.hoist_u3_setup_steps_count + aggregate_eval.hoist_u4_time_to_first_success exist; build_report wires both into metrics_report.yaml#usage_cost; sibling test file extended (>= 10 new tests total).'
    notes: |
      Follows the same pattern as Round 5 Edit B: load
      install_telemetry.json via a new --install-telemetry flag;
      pass parsed dict into build_report; emit U3 + U4 into
      metrics.usage_cost; keep degenerate path (no file supplied -> both
      null) per workspace rule "No Silent Failures".

  - id: a5
    title: Verify U1 + U2 have not regressed after SKILL.md v0.1.4 -> v0.1.5 frontmatter bump
    owner: Verify
    applies_to_metric: U1_description_readability
    primitive: verify
    exit_criterion: 'U1 in round_6 metrics_report.yaml within ±0.5% of round_5 (19.58); U2 within ±1% of round_5 (0.75).'
    notes: |
      Master plan acceptance criterion implicit in §8.3 monotonicity:
      no MVP-8 / R4 / R6 / R7 row may regress > 1%. U1/U2 are not in
      MVP-8 but are now part of D5 2/4 coverage and should remain stable
      across rounds (deterministic: description text unchanged; runner
      unchanged). Re-run count_tokens.skill_md_description_fk_grade +
      aggregate_eval.hoist_u2_first_time_success_rate against the v0.1.5
      frontmatter bump and compare.

