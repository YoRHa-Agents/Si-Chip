floor_reasoning: 'Cheapest model x depth tuple where BOTH packs reach pass_rate >= 0.80 (composer_2/default: trigger_basic=0.90, near_miss=0.83). composer_2/fast fails near_miss at 0.78. UNCHANGED from round_1 through round_4: SKILL.md body slim and the v0.1.4 frontmatter bump landing this round did not perturb cell-level pass_rates because the sweep is deterministic and pack scores are decoupled from invocation footprint.'

