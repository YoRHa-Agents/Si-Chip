    retire: 'NOT FIRED (task_delta and routing_delta strictly positive; not all axes <= 0)'
    disable_auto_trigger: 'NOT FIRED (governance_risk_delta = 0.0, not materially negative)'
  round_2_axis_movement:
    token_delta_axis_delta: '+0.31 (Round 1 -1.71 -> Round 2 -1.40)'
    context_delta_axis_delta: '+0.31 (Round 1 -1.71 -> Round 2 -1.40)'
    iteration_flavour_context_delta: '+0.1162 = (4071 - 3598) / 4071 (round-to-round footprint efficiency)'
    note: 'context_delta axis movement satisfies spec §4.1 v1_baseline iteration_delta clause (>= +0.05) by both flavours.'

simplification:
