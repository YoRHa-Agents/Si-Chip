  task_delta: 0.35              # = pass_with(0.85) - pass_without(0.50); R6 T3 — unchanged from Round 1
  token_delta: -1.40            # = (1500 - 3598) / 1500 = -1.39867; Round 1 was -1.71 — IMPROVED by +0.31
  latency_delta: -0.55          # = (0.95 - 1.4693) / 0.95 = -0.5466; unchanged from Round 1 (the runner adds same latency)
  context_delta: -1.40          # = (1500 - 3598) / 1500 = -1.39867; Round 1 was -1.71 — IMPROVED by +0.31; spec §6.1 formula `(footprint_without − footprint_with) / footprint_without`
  path_efficiency_delta: null   # L5 detour_index still not measured (spec §3.2 explicit null placeholder)
  routing_delta: 0.8934         # = trigger_F1_with(0.8934) - trigger_F1_without(0.0); R6 D6 — unchanged from Round 1
  governance_risk_delta: 0.0    # no risk regression introduced; D7 — unchanged from Round 1

