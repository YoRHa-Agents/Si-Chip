# §6.1 frozen 7-axis value vector (computed vs no_ability baseline).
# Round 2 recomputes token_delta, context_delta against the new (slimmed)
# per_invocation_footprint = 3598 (Round 1 was 4071). The other 5 axes are
# identical to Round 1 (no L5 measured, latency unchanged, routing unchanged,
# governance flat).
