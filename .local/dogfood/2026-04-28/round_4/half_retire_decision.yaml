rationale: |
  Round 4 task_delta is unchanged at +0.35 (with-ability pass_rate 0.85 vs
  no-ability baseline 0.50) which still satisfies spec §6.2 "keep" condition
  (task_delta >= +0.10). The previously inapplicable D3 L1, L3, L4 cells are
  now populated for the FIRST TIME: L1_wall_clock_p50 = 1.215 s
  (sanity invariant L1 <= L2 holds: 1.215 <= 1.469); L3_step_count = 20
  (= mean across 6 cases of len(prompt_outcomes)); L4_redundant_call_ratio
  = 0.0 (degenerate VALID value, not a missing-data sentinel — every
  prompt_id in a case is unique by construction). D3 latency_path dimension
  thereby reaches 4/7 sub-metric coverage at v1_baseline (was 1/7 at Round 3).
  The latency_delta value-vector axis ALSO improved by +0.0092 this round
  (Round 3 -0.5467 -> Round 4 -0.5375), entirely attributable to
