# Si-Chip Next-Action Plan — round_3 -> round_4
# Conforms to templates/next_action_plan.template.yaml (spec §8.1 step 4 / §8.2 evidence #5).
# target_gate stays bound to v1_baseline ("relaxed") per master plan
# (.local/.agent/active/v0.2.0-iteration-plan.yaml#round_4); promotion to
# v2_tightened is held until Round 12 readiness check.
round_id: round_4
generated_at: '2026-04-28T18:30:00+00:00'
basis_metrics_report: .local/dogfood/2026-04-28/round_3/metrics_report.yaml
basis_router_floor_report: .local/dogfood/2026-04-28/round_3/router_floor_report.yaml
prior_iteration_delta: .local/dogfood/2026-04-28/round_3/iteration_delta_report.yaml
target_gate: relaxed  # spec §5.4: relaxed -> v1_baseline

actions:
  - id: a1
    title: Populate L1_wall_clock_p50 (split p50 alongside p95 in runner percentile helper)
    owner: Implement
    applies_to_metric: L1_wall_clock_p50
    primitive: refine
    exit_criterion: 'L1_wall_clock_p50 non-null in round_4 metrics_report.yaml AND <= L2_wall_clock_p95 (sanity invariant: p50 <= p95)'
    notes: |
      Round 3 carries forward Round 2 a1's deferral. The runner currently emits
      only L2 (p95) via percentile_p95(); add a percentile_p50() sibling helper
      in evals/si-chip/runners/with_ability_runner.py and surface
      mean_latency_p50_s in summary.json. aggregate_eval.py reads it and emits
      L1_wall_clock_p50. None of L1 has a §4.1 hard threshold row at v1_baseline,
      so this is fill (not gate movement).

  - id: a2
    title: Populate L3_step_count from result.json call sequence
    owner: Implement
    applies_to_metric: L3_step_count
    primitive: refine
    exit_criterion: 'L3_step_count non-null in round_4 metrics_report.yaml AND integer >= 1'
    notes: |
      L3 step_count = number of distinct invocation steps per case. Currently
      result.json carries prompt_outcomes which is a flat list of per-prompt
      verdicts; treat each prompt as 1 step. The mean across cases gives a
      meaningful step_count proxy (typically 20 since each case has 20 prompts).
      Real-LLM upgrade path: count actual tool/MCP calls per invocation.

  - id: a3
    title: Populate L4_redundant_call_ratio (call-graph parsing)
    owner: Implement
    applies_to_metric: L4_redundant_call_ratio
    primitive: refine
    exit_criterion: 'L4_redundant_call_ratio non-null in round_4 metrics_report.yaml AND in [0.0, 1.0]'
    notes: |
      L4 = (n_redundant_calls) / (n_total_calls). For the simulated runner the
      6 deterministic cases have NO inter-prompt redundancy (each prompt is
      independent), so L4 = 0.0 is the expected value. Master plan risk_flag
      acknowledges the degenerate 0.0 — accept it and document.

  - id: a4
    title: Verify L2_wall_clock_p95 has not regressed (still ~1.469s)
    owner: Verify
    applies_to_metric: L2_wall_clock_p95
    primitive: verify
    exit_criterion: 'L2_wall_clock_p95 in round_4 metrics_report.yaml within ±1% of round_3 (1.4693 s)'
    notes: |
      Master plan acceptance criterion explicitly requires L2 not regress when
      adding the p50 sibling. Verify by re-running with_ability_runner against
      the same cases with the same seed.

  - id: a5
    title: Carry forward newly-discovered Round 3 diagnose findings
    owner: Plan
    applies_to_metric: T2_pass_k
    primitive: plan
    exit_criterion: 'T2_pass_k bottleneck (0.5478 vs v2_tightened ceiling 0.55) is captured as a candidate for a v2_tightened-readiness round (Round 12 per master plan); no new action required in Round 4.'
    notes: |
      Round 3 diagnose §5 surfaced T2_pass_k as the #1 v2_tightened blocker
      (margin -0.0022). This is a CASE-LEVEL fix (need slightly harder
      acceptance criteria or one more passing case); not a Round 4 priority,
      but tracked. Round 12 master plan v2_tightened readiness check will
      revisit.

