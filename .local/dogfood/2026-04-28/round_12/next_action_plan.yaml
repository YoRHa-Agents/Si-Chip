# Si-Chip Next-Action Plan — round_12 -> round_13 (or v0.2.0 ship at v1_baseline)
# Conforms to templates/next_action_plan.template.yaml (spec §8.1 step 4 / §8.2 evidence #5).
#
# ROUND 12 v2_TIGHTENED VERDICT: BLOCKED (consecutive_v2_passes = 0).
#
# Two HONEST paths to v0.2.0 ship are open:
#   1. Round 13 + Round 14 = real-LLM runner upgrade, regenerate baselines,
#      verify two-consecutive v2 passes. RECOMMENDED for full §4.2
#      promotion compliance.
#   2. Ship at v1_baseline as v0.2.0 with documentation. ALTERNATIVE
#      that bypasses v2_tightened entirely and ships the Round 12
#      deliverables (§6.4 detector + spec_validator extension + 7th
#      eval case) as the v0.2.0 release.
#
# This file pre-specifies BOTH paths. L0 orchestrator chooses which to
# execute. Round 13 plan defaults to path (1).
round_id: round_13
generated_at: '2026-04-28T23:30:00+00:00'
basis_metrics_report: .local/dogfood/2026-04-28/round_12/metrics_report.yaml
basis_router_floor_report: .local/dogfood/2026-04-28/round_12/router_floor_report.yaml
