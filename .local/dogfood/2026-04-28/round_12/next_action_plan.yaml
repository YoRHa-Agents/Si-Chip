target_gate: relaxed  # Per-round work continues at v1_baseline; v2 readiness verify is end-of-round check.

# Path A (RECOMMENDED): Round 13 = real-LLM runner upgrade + Round 14 verify.
# Path B (ALTERNATIVE): Round 13 = ship-prep at v1_baseline.
# Both paths are documented; L0 picks one.

actions:
  - id: a1
    title: '[PATH A] Replace deterministic SHA-256 simulator with a real-LLM runner'
    owner: Implement
    applies_to_metric: T2_pass_k
    primitive: implement
    exit_criterion: |
      evals/si-chip/runners/with_ability_runner.py and no_ability_runner.py
      replace stable_hash-based per-prompt outcomes with real LLM
      invocations. The runner produces a REAL pass_k_4 by sampling k=4
      independent runs per prompt (currently pass_k_4 = pass_rate^4 is
      a documented PROXY — a lower bound). Real sampling at k=4 should
      produce a higher pass_k for the same skill (the proxy is
      pessimistic). Round 13 metrics_report.yaml T2_pass_k >= 0.55
      under v2_tightened.
    notes: |
      Spec §11.1 forever-out compliance: a real-LLM runner is NOT a
      router model and is NOT a marketplace. It is the upgrade from
      the deterministic simulator that v0.1.x has carried since
      Round 1 (master plan defers this to v0.3.x but v0.2.0 ship gate
      forces the upgrade EARLIER if v2_tightened is the target).
      The runner SCHEMA stays stable (every result.json field is the
      same shape); only the per-prompt simulator function is swapped
      for an LLM call. aggregator_eval.py needs no change. Workspace
      rule "Mandatory Verification": runner tests must cover
      (a) deterministic mocked LLM happy path, (b) network failure
      degenerate path, (c) timeout degenerate path, (d) backward-compat
      proxy fallback when LLM creds are missing.

  - id: a2
    title: '[PATH A] Round 13 + Round 14 v2_tightened verify (consecutive)'
    owner: Verify
    applies_to_metric:                     # All v2_tightened hard threshold rows
      - T1_pass_rate
      - T2_pass_k
      - C1_metadata_tokens
      - C4_per_invocation_footprint
      - L2_wall_clock_p95
      - R3_trigger_F1
      - R4_near_miss_FP_rate
      - R6_routing_latency_p95
      - R7_routing_token_overhead
    primitive: verify
    exit_criterion: |
      Round 13 metrics_report.yaml AND Round 14 metrics_report.yaml
      BOTH pass every v2_tightened hard threshold. Emit
      v0.2.0_ship_decision.yaml v2 with verdict SHIP_ELIGIBLE at
      gate v2_tightened, consecutive_v2_passes >= 2.
    notes: |
      Per spec §4.2 promotion rule, v2_tightened ship requires
      CONSECUTIVE TWO ROUNDS passing every v2 hard threshold. With
      Round 13 = real-LLM runner upgrade, Round 13 will produce a
      real T2_pass_k. Round 14 = verification (no new feature) to
      satisfy the consecutive-two-rounds rule.

  - id: a3
    title: '[PATH B ALTERNATIVE] Ship at v1_baseline as v0.2.0 with documentation'
    owner: Implement
    applies_to_metric: null
    primitive: implement
    exit_criterion: |
      v0.2.0_ship_decision.yaml v2 (PATH B) with verdict SHIP_ELIGIBLE
      at gate RELAXED (= v1_baseline; same as v0.1.0 ship). v0.2.0
      ship report explicitly documents the v2_tightened upgrade path
      as a known limitation, citing T2_pass_k=0.4950 (current
      deterministic proxy bound) and the real-LLM-runner upgrade as
      the closure. Spec stays at v0.2.0-rc1 -> v0.2.0 final (no
      Normative semantic changes; only the project version bumps).
    notes: |
      This path SHIPS the Round 12 deliverables (§6.4 detector +
      spec_validator extension + 7th eval case + all R6 27/37 sub-
      metric coverage) as v0.2.0 at the v1_baseline gate. It honours
      the master plan's "ship_eligible" gate from v0.1.0 (which was
      relaxed/v1_baseline) and recognises that v2_tightened is a
      goal not a hard gate for v0.2.0 — the v0.2.0 ship gate was
      ASPIRATIONAL standard/v2_tightened per master plan
      .local/.agent/active/v0.2.0-iteration-plan.yaml#aggregation.ship_gate_for_v0.2.0,
      not Normative-mandated. v0.2.0 at v1_baseline still satisfies
      spec §8.3 multi-round requirement (12 consecutive v1_baseline
      passes through Round 12).

  - id: a4
    title: 'Round 13 metrics_report + provenance + 6 evidence files (whichever PATH)'
    owner: Implement
    applies_to_metric:
      - T1_pass_rate
      - T2_pass_k
      - L2_wall_clock_p95
      - R3_trigger_F1
    primitive: implement
    exit_criterion: |
      All 6 evidence files at .local/dogfood/<DATE>/round_13/:
      basic_ability_profile.yaml, metrics_report.yaml, router_floor_report.yaml,
      half_retire_decision.yaml, next_action_plan.yaml,
      iteration_delta_report.yaml. spec §8.2 minimum evidence set.
      All test suites exit 0; spec_validator --json 9/9 PASS still
      holds.
    notes: |
      Standard per-round closing. T1_pass_rate >= 0.85 (path A) OR
      >= 0.75 (path B v1_baseline). C1/C2/C4 stay within v1_baseline
      ceilings.

  - id: a5
    title: 'Mirror sync + tarball + install.sh + CHANGELOG bump (whichever PATH)'
    owner: Implement
    applies_to_metric: V3_drift_signal
    primitive: implement
    exit_criterion: |
      SKILL.md frontmatter + 3 mirrors at version 0.2.0 (path A or B);
      install.sh + docs/install.sh + docs/_install_body.md
      SI_CHIP_VERSION_DEFAULT bumped v0.1.11 -> v0.2.0;
      docs/skills/si-chip-0.2.0.tar.gz deterministic tarball generated;
      CHANGELOG.md v0.2.0 entry added. V3_drift_signal re-verified =
      0.0 (3/3 mirror byte-equality).
    notes: |
      Standard ship-prep. Path A vs B affects the ship report wording
      but not the artifact shape.

