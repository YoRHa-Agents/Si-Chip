# Si-Chip Iteration-Delta Report — round_1 vs no_ability_baseline
# Conforms to templates/iteration_delta_report.template.yaml.
# This is the FIRST iteration_delta; round_1 is compared against the no-ability
# baseline (per spec §8.1 step 7 + spec §3.1 D1 T3 baseline_delta semantics).
round_id: round_1
prior_round_id: no_ability_baseline
computed_at: '2026-04-28T09:51:30+00:00'

# §8.2 evidence #6 deltas — current round MVP-8 keys reported per dimension.
deltas:
  task_quality:
    - T1
    - T2
    - T3
  context_economy:
    - C1
    - C4
  latency_path:
    - L2
  routing_cost:
    - R3

# Per-axis status. Mirrors the §6.1 7-axis value_vector emitted in
# half_retire_decision.yaml. positive_axis = true means improvement
# (delta favourable). For axes whose delta is null the field stays null
# and positive_axis = false (cannot certify improvement on null evidence).
axis_status:
  task_quality:
    positive_axis: true
    delta: 0.35           # task_delta = +0.35
  context_economy:
    positive_axis: false
    delta: -1.71          # context_delta = -1.71 (Si-Chip footprint heavier than no-ability stand-in; expected first round)
  latency_path:
    positive_axis: false
    delta: -0.55          # latency_delta = -0.55 (Si-Chip slower than no-ability stand-in; expected first round)
  generalizability:
    positive_axis: false
    delta: 0.0            # not measured this round
  usage_cost:
    positive_axis: false
    delta: 0.0            # not measured this round
  routing_cost:
    positive_axis: true
    delta: 0.8934         # routing_delta = +0.8934 (vs no-ability baseline trigger_F1 = 0.0)
  governance_risk:
    positive_axis: false
    delta: 0.0            # no risk regression introduced; flat is good but not "positive" axis improvement

# §4.1 v1_baseline hard-threshold check vs round_1 metrics_report.yaml
v1_baseline_threshold_check:
  pass_rate:
    threshold: '>= 0.75'
    observed: 0.85
    pass: true
  pass_k:
    threshold: '>= 0.40'
    observed: 0.5478
    pass: true
  trigger_F1:
    threshold: '>= 0.80'
    observed: 0.8934
    pass: true
  near_miss_FP_rate:
    threshold: '<= 0.15'
    observed: null
    pass: inapplicable    # R4 not in MVP-8 for v1 entry; round_1 left it null per spec §3.2
  metadata_tokens:
    threshold: '<= 120'
    observed: 78
    pass: true
  per_invocation_footprint:
    threshold: '<= 9000'
    observed: 4071
    pass: true
  wall_clock_p95:
    threshold: '<= 45 s'
    observed: 1.4693
    pass: true
  routing_latency_p95:
    threshold: '<= 2000 ms'
    observed: null
    pass: inapplicable    # not yet measured (Round 2 work)
  routing_token_overhead:
    threshold: '<= 0.20'
    observed: null
    pass: inapplicable    # not yet measured (Round 2 work)
  iteration_delta_any_axis:
    threshold: '>= +0.05'
    observed: 0.8934      # routing_delta wins this clause
    pass: true

verdict:
  pass_v1_baseline: true
  blockers: []
  rationale: 'All measured v1_baseline hard thresholds pass; iteration_delta clause satisfied by routing_delta = +0.8934 (>= +0.05). The three inapplicable rows (R4_near_miss_FP_rate, R6_routing_latency_p95, R7_routing_token_overhead) are not MVP-8 metrics; per spec §3.2 they are explicit null this round and tracked in next_action_plan.yaml a3 for Round 2 instrumentation.'

monotonicity_check_required: true
monotonicity_check_status:
  performed: false
  reason: 'No prior dogfood round to compare against; baseline is no_ability. Monotonicity will be exercised in Round 2 (round_2 vs round_1).'

# Spec §4 Promotion Rule trace (for the next round to consume).
promotion_state:
  current_gate: v1_baseline
  consecutive_v1_passes: 1
  promotable_to: 'v2_tightened only after 2 consecutive v1 passes (round_2 must also pass)'

provenance:
  generator: 'S4 dogfood Round 1 (manual orchestration)'
  spec_version: v0.1.0
  basis_metrics_report: .local/dogfood/2026-04-28/round_1/metrics_report.yaml
  basis_half_retire_decision: .local/dogfood/2026-04-28/round_1/half_retire_decision.yaml
  baseline_summary: evals/si-chip/baselines/no_ability/summary.json
