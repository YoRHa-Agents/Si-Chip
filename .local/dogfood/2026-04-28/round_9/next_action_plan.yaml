# alternative clause Rounds 3/4/5/6/7/8/9 invoked.

deferred_from_round_9:
  - id: r8_tfidf_cosine_mean_parallel
    title: 'Compute R8 tfidf_cosine_mean alongside max_jaccard for cross-validation'
    deferral_reason: |
      Round 9 populates R8 with method="max_jaccard" (byte-identical to
      C6 by construction). The method="tfidf_cosine_mean" variant is
      IMPLEMENTED in count_tokens.py and tested, but not hoisted into
      metrics_report.yaml this round (to keep the metric stable). A
      future round may compute both methods in parallel for
      cross-validation of WORST-offender (max_jaccard) vs AVERAGE-
      competition (tfidf_cosine_mean) signals.
    refer_to: '.agents/skills/si-chip/scripts/count_tokens.py::skill_md_description_competition_index'
  - id: r1_r2_out_of_scope_v01x
    title: 'R1_trigger_precision + R2_trigger_recall remain null for v0.1.x'
    deferral_reason: |
      Neither has a §4.1 hard threshold. Populating them requires a
      real-LLM runner emitting per-prompt routing-descriptor-match
      scores (not the deterministic simulator's per-prompt correctness
      bool). Round 12 / real-LLM-runner upgrade path.
    refer_to: '.local/dogfood/2026-04-28/round_9/basic_ability_profile.yaml#decision.risk_flags'
  - id: full_96_cell_profile_stays_v2_only
    title: 'Full 96-cell router-test profile stays gated to v2_tightened+'
    deferral_reason: |
      Round 9 added the INTERMEDIATE profile (16 cells) as a v1_baseline
      widening; the FULL 96-cell profile still requires v2_tightened+
      per spec §5.3. 4 of the 6 full-profile models (haiku_4_5,
      sonnet_4_6, opus_4_7, gpt_5_mini) require real-LLM invocation;
      the current deterministic simulator does not cover them.
    refer_to: 'templates/router_test_matrix.template.yaml#profiles.full'
  - id: a5_round_4_deferred
    title: 'Populate L5/L6/L7 (D3 latency_path completion to 7/7)'
    deferral_reason: |
      D3 stays at 4/7; L5_detour_index, L6_replanning_rate, L7_think_act_split
      require a real-LLM run. Master plan defers these to post-v0.2.0.
    refer_to: 'evals/si-chip/runners/with_ability_runner.py docstring "DETERMINISTIC SIMULATED BASELINE" section'
  - id: a5_round_3_deferred
    title: 'T2_pass_k v2_tightened margin (0.5478 vs 0.55; delta -0.0022)'
    deferral_reason: |
      CASE-LEVEL fix needed. Round 12 master plan v2_tightened
      readiness check will revisit.
    refer_to: '.local/dogfood/2026-04-28/round_9/raw/notes.md §5 bullet 1'
  - id: u4_round_6_live_wall_clock
    title: 'U4 live wall-clock (dry_run=False) sampling for p50 + p95'
    deferral_reason: 'Round 9 U4 carried from Round 6/7/8 dry-run floor estimate (0.0073 s). Round 12 / real-LLM-runner upgrade candidate.'
    refer_to: 'round_6/metrics_report.yaml provenance.u4_derivation.interpretation_note'
  - id: c5_heuristic_proxy
    title: 'C5_context_rot_risk is currently a HEURISTIC PROXY (not ground-truth)'
    deferral_reason: 'Round 7 C5 = 0.2601 uses a deterministic formula proxy. Full ground-truth requires Round 12 LLM-backed runner upgrade.'
    refer_to: '.local/dogfood/2026-04-28/round_7/raw/c5_derivation.json'
  - id: v2_pattern_coverage
    title: 'V2 credential-surface scanner is PATTERN-BASED; entropy-based scan deferred'
    deferral_reason: |
      Round 8 V2 scanner covers 4 canonical patterns. Full coverage
      would integrate truffleHog / gitleaks-style entropy scanning —
      out of scope for Round 10 (G1 fill is the primary target).
    refer_to: '.local/dogfood/2026-04-28/round_8/basic_ability_profile.yaml#decision.risk_flags'

