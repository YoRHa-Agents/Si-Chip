# Si-Chip Next-Action Plan — round_9 -> round_10
# Conforms to templates/next_action_plan.template.yaml (spec §8.1 step 4 / §8.2 evidence #5).
# target_gate stays bound to v1_baseline ("relaxed") per master plan
# (.local/.agent/active/v0.2.0-iteration-plan.yaml#round_10); promotion to
# v2_tightened is held until Round 12 readiness check.
round_id: round_10
generated_at: '2026-04-28T22:00:00+00:00'
basis_metrics_report: .local/dogfood/2026-04-28/round_9/metrics_report.yaml
basis_router_floor_report: .local/dogfood/2026-04-28/round_9/router_floor_report.yaml
prior_iteration_delta: .local/dogfood/2026-04-28/round_9/iteration_delta_report.yaml
target_gate: relaxed  # spec §5.4: relaxed -> v1_baseline

actions:
  - id: a1
    title: Populate G1_cross_model_pass_matrix (D4 generalizability — first sub-metric)
    owner: Implement
    applies_to_metric: G1_cross_model_pass_matrix
    primitive: implement
    exit_criterion: 'G1_cross_model_pass_matrix non-null in round_10 metrics_report.yaml (2x2 nested dict at minimum: {composer_2: {trigger_basic: <pass_rate>, near_miss: <pass_rate>}, sonnet_shallow: ...})'
    notes: |
      Master plan Round 10: collapse the existing 8-cell MVP router-test
      along the depth dimension (2 models × 2 depths × 2 packs) to
      produce a 2-model-by-2-pack pass_rate matrix and emit it as G1.
      D4 generalizability moves from 0/4 to 1/4 measured (G2/G3/G4 stay
      null — cross-domain, OOD, version-stability are out of scope for
      v0.1.x; Round 11 reconciles whether they ship in v0.2.0 or later).

      Helper: extend aggregate_eval.py with a new
      hoist_g1_cross_model_pass_matrix() that takes the router_floor_report
      and returns a nested dict of pass_rates per (model, pack).

  - id: a2
    title: Create evals/si-chip/golden_set/ seed for future real-LLM runs
    owner: Implement
    applies_to_metric: G1_cross_model_pass_matrix
    primitive: implement
    exit_criterion: 'evals/si-chip/golden_set/ created with at least one trigger_basic.yaml + one near_miss.yaml file (~12-20 prompts each); next round of nines self-eval can opt-in via --golden-dir'
    notes: |
      Nines self-eval from Round 3 flagged D01 scoring_accuracy=0 and
      D02 eval_coverage=0 because the workspace has no
      data/golden_test_set/ directory. Create a minimal seed so Round 10+
      rounds can opt-in to a real golden set without renaming later.
      Draw from the existing evals/si-chip/cases/ prompts.

  - id: a3
    title: Verify R8 + intermediate-profile stability after golden-set creation
    owner: Verify
    applies_to_metric: R8_description_competition_index
    primitive: verify
    exit_criterion: 'R8 and intermediate-profile sweep values byte-identical to Round 9 after Round 10 changes (deterministic re-run); spec_validator --json default-mode 8/8 PASS still holds'
    notes: |
      Round 10 introduces golden_set/ prompts and a G1 hoist. Neither
      should perturb R8 (same SKILL.md description + same neighbor set)
      nor the intermediate sweep (hard-coded deterministic cells). A
      stability regression would flag an unintended coupling.

  - id: a4
    title: Unit tests for G1 hoist + golden_set validation
    owner: Test
    applies_to_metric: G1_cross_model_pass_matrix
    primitive: test
    exit_criterion: 'test_aggregate_eval.py extended with HoistG1Tests (~4 tests); golden_set/ YAML files validated via evals/si-chip/runners/with_ability_runner._validate_case (no runner changes needed)'
    notes: |
      Workspace rule "Mandatory Verification" — G1 hoist must be tested
      for happy path, degenerate paths (missing router_floor_report,
      malformed cells), 28-key invariant preservation, and the
      2-model-by-2-pack matrix shape.

  - id: a5
    title: Regenerate CHANGELOG, install.sh, docs, mirrors, and tarball at v0.1.9
    owner: Implement
    applies_to_metric: V3_drift_signal
    primitive: implement
    exit_criterion: 'SKILL.md frontmatter + mirrors at 0.1.9; install.sh + docs at v0.1.9; docs/skills/si-chip-0.1.9.tar.gz deterministic tarball; CHANGELOG Round 10 entry; V3_drift_signal re-verified = 0.0 (all 3 mirrors byte-equal)'
    notes: |
      Standard per-round sync. V4_staleness_days re-counted from the
      Round 10 lifecycle.last_reviewed_at (may move forward if the
      Round 10 date differs).

expected_iteration_delta_axes:
  - generalizability     # via a1 (G1 null -> populated; D4 0/4 -> 1/4)

# Pre-commitment: round_10 must show movement on the generalizability axis (per
# spec §4.1 v1_baseline iteration_delta row, any axis >= +0.05). The
