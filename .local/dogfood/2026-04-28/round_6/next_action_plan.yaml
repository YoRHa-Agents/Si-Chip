actions:
  - id: a1
    title: Populate C5_context_rot_risk via body-tokens-ratio + reference-fanout heuristic
    owner: Implement
    applies_to_metric: C5_context_rot_risk
    primitive: implement
    exit_criterion: 'C5_context_rot_risk non-null in round_7 metrics_report.yaml AND in [0.0, 1.0] (range sanity)'
    notes: |
      Round 6 closes D5 usage_cost (4/4 sub-metric coverage). Round 7
      targets D2 context_economy: the last two nulls (C3 stays null
      per resolved-on-demand semantics; C5 + C6 are the Round 7 target).
      C5 = deterministic proxy based on the 2026 frontier-model
      context-rot studies cited in references/metrics-r6-summary.md.
      Formula candidate: ``C5 = clip(body_tokens / typical_context_window
      + 0.05 * reference_fanout_depth, 0.0, 1.0)`` where
      typical_context_window = 200_000 (Sonnet 4.6 baseline;
      extendable to 1_000_000 for Opus-class). For Si-Chip v0.1.5:
      body_tokens = 2020; fanout_depth = 1 (references loaded
      on-demand, not recursively). Expected C5 ~= 0.06 (LOW — slim
      body).

      Add a helper `.agents/skills/si-chip/scripts/count_tokens.py::
      context_rot_risk(body_tokens, fanout_depth, typical_window)`
      with doctests; hoist via
      aggregate_eval.hoist_c5_context_rot_risk; extend test_count_tokens.py
      and test_aggregate_eval.py with a minimum of 8 new tests.

      Dependencies: no install.sh or runner changes required; C5 is
      a static-analysis metric on SKILL.md body + references index.

  - id: a2
    title: Populate C6_scope_overlap_score via Jaccard similarity to neighbor skills
    owner: Implement
    applies_to_metric: C6_scope_overlap_score
    primitive: implement
    exit_criterion: 'C6_scope_overlap_score non-null in round_7 metrics_report.yaml AND in [0.0, 1.0] (range sanity)'
    notes: |
      C6 = Jaccard similarity between Si-Chip SKILL.md description
      tokens (normalized: lowercase, strip punct, stopword-filtered)
      and the next N neighbor skills in the workspace
      `.agents/skills/*/SKILL.md`. Workspace is currently Si-Chip-only
      so the fallback neighbor set is `/root/.claude/skills/lark-*/SKILL.md`
      families (28+ neighbors). Record the chosen neighbor set in
      round_7/raw/c6_overlap_pairs.json with per-pair Jaccard.

      Formula:
        1. Tokenize each description (NFKD + lowercase + strip
           non-alphanumeric; split on whitespace).
        2. Filter stopwords (minimal list: "the", "a", "an", "when",
           "use", "this", "for", "it", "with", "...").
        3. Compute Jaccard = |A ∩ B| / |A ∪ B| per pair.
        4. C6 = max(Jaccard) across the neighbor set (conservative
           choice — surfaces the WORST description-competition
           offender).

      Add helper in count_tokens.py; hoist in aggregate_eval.py;
      record deriv in raw/c6_overlap_pairs.json.

  - id: a3
    title: Add unit tests for C5/C6 helpers (per workspace Mandatory Verification rule)
    owner: Test
    applies_to_metric: C5_context_rot_risk
    primitive: test
    exit_criterion: 'count_tokens.py + aggregate_eval.py test files extended with >= 12 new tests total covering C5 formula, C6 Jaccard, degenerate paths, range sanity'
    notes: |
      Cover:
      - C5 formula correctness on slim body (expected 0.01-0.10)
      - C5 formula at saturation (body_tokens == typical_window → 1.0)
      - C5 formula degenerate path (body_tokens == 0 → 0.05 * fanout_depth)
      - C5 range clamp to [0.0, 1.0]
      - C6 Jaccard on identical description (1.0)
      - C6 Jaccard on disjoint descriptions (0.0)
      - C6 Jaccard on partial overlap
      - C6 max-reduction across neighbor set
      - C6 stopword filtering behaviour
      - Build-report integration (C5/C6 populated when helpers pass)
      - Build-report degenerate path (helpers return None → metric null)
      - 28-key invariant preserved after Round 7

  - id: a4
    title: Verify U3 + U4 have not regressed after SKILL.md v0.1.5 -> v0.1.6 frontmatter bump
    owner: Verify
    applies_to_metric: U3_setup_steps_count
    primitive: verify
    exit_criterion: 'U3 in round_7 metrics_report.yaml == 1 (unchanged); U4 within ±50% of round_6 (acceptable dry-run timing variance — sub-ms values have high relative jitter but absolute value stays << 60 s ceiling).'
    notes: |
      Master plan acceptance criterion implicit in §8.3 monotonicity:
      no MVP-8 / R4 / R6 / R7 row may regress > 1%. U3 is deterministic
      (header-parsed); it must stay at 1. U4 has timing jitter
      (subprocess overhead + per-invocation cpu load) but the absolute
      value stays below 1 s and the sanity ceiling is 60 s, so a ±50%
      tolerance on the raw measurement is acceptable. Re-run
      tools/install_telemetry.py --json against the v0.1.6 install.sh
      and compare.

  - id: a5
    title: Flag top-3 blockers for Round 12 v2_tightened readiness
    owner: Diagnose
    applies_to_metric: T2_pass_k
    primitive: diagnose
    exit_criterion: 'round_7/raw/notes.md §5 lists top-3 v2_tightened blockers; iteration_delta_report.yaml promotion_state.blockers_for_v2 lists the same 3 items.'
    notes: |
