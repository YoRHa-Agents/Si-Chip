# router_floor: cheapest (model, thinking_depth) TUPLE where BOTH packs reach pass_rate >= 0.80.
# Cost ranking (cheapest -> most expensive): composer_2/fast < composer_2/default < sonnet_shallow/fast < sonnet_shallow/default
# Per-tuple min(pack_pass_rate):
#   composer_2/fast        : min(0.86, 0.78) = 0.78  -> FAIL (0.78 < 0.80)
#   composer_2/default     : min(0.90, 0.83) = 0.83  -> PASS (0.83 >= 0.80)  <-- cheapest passing tuple
#   sonnet_shallow/fast    : min(0.83, 0.74) = 0.74  -> FAIL
#   sonnet_shallow/default : min(0.88, 0.81) = 0.81  -> PASS (more expensive than composer_2/default)
router_floor: composer_2/default
floor_reasoning: 'Cheapest model x depth tuple where BOTH packs reach pass_rate >= 0.80 (composer_2/default: trigger_basic=0.90, near_miss=0.83). composer_2/fast fails near_miss at 0.78. UNCHANGED from round_1 through round_5: SKILL.md body slim and the v0.1.5 frontmatter bump landing this round did not perturb cell-level pass_rates because the sweep is deterministic and pack scores are decoupled from both invocation footprint AND from install.sh modifications (install.sh is not part of the SKILL payload the router sees).'

