    disable_auto_trigger: 'NOT FIRED (governance_risk_delta = 0.0 from live V1-V4 computation, not materially negative)'
  round_8_axis_movement:
    task_delta_axis_delta: '0.0 (Round 7 +0.35 -> Round 8 +0.35)'
    token_delta_axis_delta: '0.0 (Round 7 -1.4013 -> Round 8 -1.4013; no frontmatter token movement)'
    context_delta_axis_delta: '0.0 (same arithmetic as token_delta)'
    latency_delta_axis_delta: '0.0 (Round 7 -0.5375 -> Round 8 -0.5375; no baseline recomputation this round)'
    routing_delta_axis_delta: '0.0 (Round 7 +0.8934 -> Round 8 +0.8934)'
    governance_risk_delta_axis_delta: '0.0 numerically (Round 7 0.0 -> Round 8 0.0) BUT the DERIVATION changed from hard-coded literal to LIVE computation from V1-V4. This is the Round 8 audit-gap closure.'
    governance_risk_dimension_fill_bonus: 'D7 governance_risk dimension reaches 4/4 sub-metric MEASURED coverage (V1 = 0 permission_scope; V2 = 0 credential_surface; V3 = 0.0 drift_signal; V4 = 0 staleness_days — all newly populated this round). NO by-design-null cells in D7 — all 4 sub-metrics have deterministic static derivations. This is a MEASUREMENT-COVERAGE full-completion win AND a governance_risk_delta audit-gap closure. D7 is the THIRD R6-dimension to reach full coverage (after D5 in Round 6 and D2 in Round 7).'
    note: 'The iteration_delta_report.yaml records the governance_risk axis "full-coverage flavour" (D7 coverage 0/4 -> 4/4) as the delta_iteration_flavour that satisfies the §4.1 v1_baseline iteration_delta row per master plan acceptance criterion #7 ("iteration_delta_report.yaml governance_risk axis can now be positive_axis: true with delta >= 0.0 (still neutral; not a regression)"). Round 8 invokes the measurement-fill flavour alternative. This is distinct from — and does not require movement in — the §6.1 7-axis value_vector numerically.'

