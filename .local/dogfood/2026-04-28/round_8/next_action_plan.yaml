    title: 'V2 credential-surface scanner is PATTERN-BASED; entropy-based scan deferred'
    deferral_reason: |
      Round 8 V2 scanner covers 4 canonical patterns (aws_access_key,
      pem_private_key, credential_assignment, generic_high_entropy_40).
      A secret encoded in a non-pattern-matching format (e.g. a base64
      OAuth token < 40 chars) would be missed. Full coverage would
      integrate truffleHog / gitleaks-style entropy scanning — out of
      scope for Round 9 (R8 fill is the primary target).
