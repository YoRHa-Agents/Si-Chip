    owner: Implement
    applies_to_metric: R8_description_competition_index
    primitive: implement
    exit_criterion: 'templates/router_test_matrix.template.yaml introduces an intermediate profile alongside mvp:8 and full:96; cell_counts updated; spec_validator extended to assert intermediate.cells == 16'
    notes: |
      Master plan Round 9 scope: ADDITIVE-only router-test widening
      to a 16-cell intermediate profile (2 model × 2 thinking_depth ×
      4 scenario OR 3 model × 2 thinking_depth × 2 scenario ×
      whatever fits). The mvp:8 and full:96 profiles remain frozen.
      The intermediate profile is metadata-retrieval / kNN-heuristic
      expansion per spec §5.1 surface 1+2 — NOT router model training
      (spec §5.2 still prohibits that).

      Template bump: $schema_version 0.1.0 -> 0.1.1 on
      router_test_matrix.template.yaml; spec_validator.py must accept
      both 0.1.0 and 0.1.1 schemas. The intermediate profile is
      gate-bound to relaxed (v1_baseline) — same as mvp.

  - id: a3
    title: Emit BOTH mvp 8-cell AND intermediate 16-cell sweeps from router_floor_report
    owner: Implement
    applies_to_metric: R5_router_floor
    primitive: implement
    exit_criterion: 'router_floor_report.yaml emits BOTH mvp 8-cell and intermediate 16-cell sweeps; router_floor selection uses the intersection (cheapest cell passing on BOTH profiles)'
    notes: |
      Stability check: the intermediate profile must not perturb the
      mvp:8 pass/fail grid. Run the deterministic sweep twice and
      confirm the 8 mvp cells are byte-identical between the two
      profiles (they share datasets).

  - id: a4
