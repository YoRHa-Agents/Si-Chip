    - 'V1_permission_scope = 0 is a STATIC scan (tools/governance_scan.py) that walks the skill''s Python / shell source for hardcoded absolute write paths. It cannot observe DYNAMIC runtime writes (e.g. a script that constructs a path via string interpolation at runtime would be missed). For Si-Chip v0.1.7 this is a non-issue because scripts route writes through caller-provided --out arguments; the convention is explicit. A Round 12 / real-LLM-runner upgrade could add OTel-trace-based runtime write tracking for dynamic-path coverage.'
    - 'V2_credential_surface = 0 scans the static artifact bodies for pattern matches. Patterns cover: AWS access key, PEM private key markers, generic 40-char hex tokens, and ``name = "value"`` assignment-style secrets. A secret encoded in a non-pattern-matching format (e.g. base64-encoded OAuth token under 40 chars) would be missed. Future hardening: integrate truffleHog / gitleaks-style entropy-based scanning on top. Not Round 8 scope.'
    - 'V3_drift_signal = 0.0 measures byte-equality across the 3 SKILL.md mirrors. It does NOT detect semantic drift (e.g. references/ mismatches or scripts/ differences across trees). Full-tree drift check is a separate §7.2 CI invariant; V3 is the single-artifact binary signal. The per-CHANGELOG-entry "Mirror drift verified = 0 across all 3 trees" language from Rounds 3-7 is the fuller check.'
    - 'V4_staleness_days = 0 on day-of-review; rises monotonically thereafter until the next dogfood round moves last_reviewed_at forward. Spec §6 cadence is 30/60/90 days — V4 > 30 on a "keep" decision signals the ability is due for re-review.'
