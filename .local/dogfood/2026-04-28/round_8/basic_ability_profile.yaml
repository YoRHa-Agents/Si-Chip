    - 'C6 = 0.0435 carried from Round 7 is a Jaccard similarity against a heuristic neighbor set (23 lark-* neighbors). R8 description_competition_index (Round 9 target) will replace this with the formal across-matrix index.'
    - 'U4 = 0.0073 s carried from Round 7 is a dry-run FLOOR estimate (not a live-install wall-clock). Master plan risk_flag ongoing; full live p50+p95 is a Round 12 / real-LLM-runner upgrade candidate.'
    - 'U1 = 19.58 carried from Round 5/6/7 is still high (dense technical vocabulary). Master plan round_5 risk_flag ongoing.'
    - 'L4_redundant_call_ratio = 0.0 carried from Round 5/6/7 is a degenerate VALID value (every prompt_id within a case is unique by construction). Documented in master plan risk_flag.'
    - 'router_floor cells remain simulated (deterministic SHA-256-based); R6_routing_latency_p95 = 1100 ms is sweep-latency, not yet a real-LLM latency. Real-LLM swap path documented at evals/si-chip/runners/with_ability_runner.py.'
