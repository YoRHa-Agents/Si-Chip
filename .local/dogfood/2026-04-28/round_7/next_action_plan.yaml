# Si-Chip Next-Action Plan — round_7 -> round_8
# Conforms to templates/next_action_plan.template.yaml (spec §8.1 step 4 / §8.2 evidence #5).
# target_gate stays bound to v1_baseline ("relaxed") per master plan
# (.local/.agent/active/v0.2.0-iteration-plan.yaml#round_8); promotion to
# v2_tightened is held until Round 12 readiness check.
round_id: round_8
generated_at: '2026-04-28T20:30:00+00:00'
basis_metrics_report: .local/dogfood/2026-04-28/round_7/metrics_report.yaml
basis_router_floor_report: .local/dogfood/2026-04-28/round_7/router_floor_report.yaml
prior_iteration_delta: .local/dogfood/2026-04-28/round_7/iteration_delta_report.yaml
target_gate: relaxed  # spec §5.4: relaxed -> v1_baseline

actions:
  - id: a1
    title: Populate V1_permission_scope via filesystem-write audit
    owner: Implement
    applies_to_metric: V1_permission_scope
    primitive: implement
    exit_criterion: 'V1_permission_scope non-null in round_8 metrics_report.yaml (integer count or 0)'
    notes: |
      Round 7 closes D2 context_economy (5/6 measured + 1 by-design
      null). Round 8 targets D7 governance_risk: 4/4 sub-metric fill
      per master plan. V1 = count of filesystem paths the skill
      writes outside .local/dogfood/ (currently expected = 0, clean).

      Helper: new tools/governance_scan.py (V1_permission_scope);
      walks the skill's script sources + templates + install.sh to
      enumerate write surfaces (mkdir, open-for-write, subprocess
      invocation of rm/mv, etc.). Record the pattern list in
      round_8/raw/governance_scan.json for reproducibility.

  - id: a2
    title: Populate V2_credential_surface via secret-pattern scan
    owner: Implement
    applies_to_metric: V2_credential_surface
    primitive: implement
    exit_criterion: 'V2_credential_surface non-null in round_8 metrics_report.yaml (integer count or 0; MUST NOT log secret values themselves — only pattern names + counts)'
    notes: |
      V2 = count of credential / secret PATTERNS referenced in any
      skill artifact. Patterns: {API_KEY, AWS_ACCESS_KEY_ID, password,
      token, secret, private_key, bearer, etc.}. Currently expected = 0
      (clean — no hard-coded credentials in any skill artifact).

      CRITICAL: The scanner must NOT log the actual VALUE of any
      credential-like match — only the pattern name + file + line
      number. Workspace "No Silent Failures" rule applies: if a
      secret is detected, the scanner surfaces it loudly (counts +
      line pointers) but never leaks the value. Master plan Round 8
      risk_flag explicitly acknowledged this.

  - id: a3
    title: Populate V3_drift_signal + V4_staleness_days
    owner: Implement
    applies_to_metric: V3_drift_signal
    primitive: implement
    exit_criterion: 'V3_drift_signal non-null in [0.0, 1.0]; V4_staleness_days non-null (integer >= 0)'
    notes: |
      V3 = 1 - cross_tree_drift_zero ratio across the 3 mirrors
      (.agents, .cursor, .claude). Currently expected = 0.0 (clean
      per v0.1.0 ship report's ALL_TREES_DRIFT_ZERO verdict; every
      Round 7 mirror sync must preserve this).
      V4 = days since last_reviewed_at on the basic_ability_profile.
      Round 7 last_reviewed_at = 2026-04-28; V4 on 2026-04-28 = 0
      days (same-day review).

      Helper lives in tools/governance_scan.py (same file as V1+V2);
      emits a shared JSON payload hoisted by aggregate_eval.

  - id: a4
    title: Unit tests for tools/governance_scan.py (workspace Mandatory Verification rule)
    owner: Test
    applies_to_metric: V1_permission_scope
    primitive: test
    exit_criterion: 'tools/test_governance_scan.py has >= 15 unit tests covering V1/V2/V3/V4 happy paths, degenerate paths, and the MUST-NOT-log-secret-values invariant'
    notes: |
      Cover:
      - V1 happy path (scans scripts + install.sh; counts write
        surfaces)
      - V1 zero case (empty target dir)
      - V1 missing target dir raises
      - V2 happy path (finds common secret pattern)
      - V2 MUST-NOT-log-values invariant (asserts the scanner logs
        pattern name + line number but NOT the captured value)
      - V2 zero case (clean source tree)
      - V3 zero case (identical mirrors)
      - V3 non-zero case (synthetic drift)
      - V4 same-day case (V4 = 0)
      - V4 staleness case (frozen date; verify integer monotonicity)
      - 28-key invariant preserved after Round 8
      - Build-report integration populates V1-V4 when scanner runs

  - id: a5
    title: Assert half_retire_decision.yaml governance_risk_delta uses live V1-V4 input (not hard-coded 0.0)
    owner: Verify
    applies_to_metric: V4_staleness_days
    primitive: verify
    exit_criterion: 'round_8/half_retire_decision.yaml governance_risk_delta derived from V1/V2/V3/V4 via (with - without) arithmetic; no longer a hard-coded 0.0'
    notes: |
      Master plan Round 8 acceptance criterion: "half_retire_decision.yaml
      governance_risk_delta is no longer hard-coded 0.0 — uses live
      V1-V4 input". Until Round 8, the governance_risk_delta axis is
      always 0.0 because no risk dimension has been measured. After
      Round 8, it should reflect the actual Si-Chip governance
      footprint (expected ≈ 0 for clean baseline, but computed, not
      stipulated).

expected_iteration_delta_axes:
  - governance_risk     # via a1-a4 (V1-V4 fill) — currently 0/4 D7 sub-metrics, target 4/4

