    title: 'Populate L5/L6/L7 (D3 latency_path completion to 7/7)'
    deferral_reason: |
      D3 stays at 4/7; L5_detour_index, L6_replanning_rate, L7_think_act_split
      require a real-LLM run (the simulated runner has no detour / replanning
      notion). Master plan defers these to post-v0.2.0 (the LLM-backed
      runner upgrade) and does not enumerate them as gate-blocking rows.
    refer_to: 'evals/si-chip/runners/with_ability_runner.py docstring "DETERMINISTIC SIMULATED BASELINE" section + Round 4 risk_flag.'
  - id: a5_round_3_deferred
    title: 'T2_pass_k v2_tightened margin (0.5478 vs 0.55; delta -0.0022)'
    deferral_reason: |
      CASE-LEVEL fix needed (slightly harder acceptance criteria or one more
      passing case); not a Round 8 priority. Round 12 master plan
      v2_tightened readiness check will revisit.
    refer_to: '.local/dogfood/2026-04-28/round_7/raw/notes.md §5 bullet 1'
  - id: u4_round_6_live_wall_clock
    title: 'U4 live wall-clock (dry_run=False) sampling for p50 + p95'
    deferral_reason: |
      Round 7 U4 is carried from Round 6 dry-run floor estimate (0.0073 s).
      A live wall-clock (with network download + tar extraction) would
      capture the actual user-experience time for the one-line install.
      Requires either (a) a local tarball mirror at
      docs/skills/si-chip-0.1.6.tar.gz with a file:// source-url that
      the installer can actually consume, or (b) a dedicated CI job with
      network access. Round 12 + real-LLM runner upgrade is the
      recommended path; the dry-run floor is v1_baseline-adequate for
      the dogfood feedback loop.
    refer_to: 'round_6/metrics_report.yaml provenance.u4_derivation.interpretation_note'
  - id: c5_heuristic_proxy
    title: 'C5_context_rot_risk is currently a HEURISTIC PROXY (not ground-truth)'
    deferral_reason: |
      Round 7 C5 = 0.2601 uses a deterministic formula
      (body_tokens/typical_window + 0.05*fanout_depth) derived from
      the 2026 frontier-model context-rot studies cited in
      references/metrics-r6-summary.md. Replacing the heuristic
      coefficient with a real-LLM empirical measurement requires the
      Round 12 LLM-backed runner upgrade. Master plan Round 7
      risk_flag explicitly accepts the heuristic as v1_baseline-
      adequate for measurement-fill purposes.
    refer_to: '.local/dogfood/2026-04-28/round_7/raw/c5_derivation.json'

