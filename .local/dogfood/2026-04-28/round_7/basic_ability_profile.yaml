    - 'C5 = 0.2601 is a HEURISTIC PROXY, not a ground-truth context-rot measurement. The fanout-depth coefficient (0.05 per referenced .md file) is drawn from the 2026 frontier-model context-rot studies cited in references/metrics-r6-summary.md but it is still an approximation. Interpretation: the value surfaces that the 5-reference fanout amortises ~25% of a 200k-token window BEFORE the body itself; the slim 2020-token body keeps total risk well below saturation (0.26 << 1.0). Master plan Round 7 risk_flag explicitly flags C5 as a v1_baseline-acceptable proxy. v1_baseline has no §4.1 hard threshold on C5 — range sanity ([0.0, 1.0]) is the only gate.'
    - 'C6 = 0.0435 is a Jaccard similarity COMPUTED against a heuristic neighbor set (/root/.claude/skills/lark-*/SKILL.md — 23 neighbors; the only skill family present in the workspace at round_7 time). Changing the neighbor set (e.g. to a different family) would change C6; this is expected and is why the derivation record (raw/c6_overlap_pairs.json) enumerates every neighbor path + per-pair Jaccard for reproducibility. R8 description_competition_index (Round 9 target) will replace this conservative-max metric with the formal across-matrix index.'
    - 'U4 = 0.0073 s carried from Round 6 is a dry-run FLOOR estimate (not a live-install wall-clock). Real wall-clock would include ~1-5 s HTTP download + ~100-200 ms tar extraction. Master plan risk_flag ongoing; full live p50+p95 is a Round 12 / real-LLM-runner upgrade candidate.'
    - 'U1 = 19.58 (clamped FK grade) carried from Round 5/6 is still high — reflects dense technical vocabulary. Master plan round_5 risk_flag ongoing.'
    - 'U2 = 0.75 < pass_rate 0.85 carried from Round 6 because U2 counts only should_trigger prompts while pass_rate counts both slices.'
    - 'L4_redundant_call_ratio = 0.0 carried from Round 5/6 is a degenerate VALID value (every prompt_id within a case is unique by construction). Documented in master plan risk_flag.'
    - 'router_floor cells remain simulated (deterministic SHA-256-based); R6_routing_latency_p95 = 1100 ms is sweep-latency, not yet a real-LLM latency. Real-LLM swap path documented at evals/si-chip/runners/with_ability_runner.py.'
