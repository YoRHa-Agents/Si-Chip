        maintenance round (no spec / template / docs touch). It is a STABILITY WITNESS
        round that re-runs the eval pack against the now-frozen v0.5.0 spec to confirm
        metrics stability without source-code changes.
    Q4: default classification → measurement_only.

  Round 27 emits **6 evidence files** per §8.2 (NOT 7 — ship_prep is one-time and was
  consumed at Round 26 per §20.4 conditional clause; measurement_only round_kind
  expected count = 6 per §13.5.4 EVIDENCE_FILES BLOCKER conditional rule).

  Per §15.4.1 the measurement_only round counts toward the §4.2 promotion-rule
  consecutive-rounds counter when (a) C0 == 1.0, (b) C0 >= prior_round.C0 (strict
  equality for measurement_only per §15.3), (c) no v1_baseline hard gate regressed.
  Round 27 satisfies all three (C0 = 1.0 + 1.0 → 1.0 strict equality + no v1_baseline
  regression; 27th consecutive v1 pass; 10th consecutive v2 pass).

  Per §15.2 the iteration_delta clause is RELAXED to monotonicity-only for
  measurement_only rounds — the iteration_delta_report.yaml documents the audit but
  does not require a fresh per-axis bucket lift. NO axis lift is claimed (would be
  DISHONEST per §15.2 RELAXED clause prose). The verdict.pass = true is via
  monotonicity-only clause: C0 == prior strict equality + no v1_baseline regression.

