  and v0.3.0-rc1. The 2 NEW BLOCKERs (CORE_GOAL_FIELD_PRESENT +
  ROUND_KIND_TEMPLATE_VALID) close the §13.5.4 acceptance gap and
  add 2 hard lint-time gates that will catch absent core_goal blocks
  / invalid round_kind values in any future round at template-lint time
