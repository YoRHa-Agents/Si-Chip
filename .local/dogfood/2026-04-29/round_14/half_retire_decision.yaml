  c0_pass_rate: 1.0
  cases_run: 5
  cases_passed: 5
  failed_case_ids: []
  no_regression: true                            # vacuous: round_13 had no core_goal_test_pack
  pack_version: '1.0.0'
  test_pack_path: .local/dogfood/2026-04-29/abilities/si-chip/core_goal_test_pack.yaml
  prior_c0_pass_rate: null                       # round_13 had no pack
  rollback_required: false
  spec_section: '§14.7 (reactivation prerequisite hygiene) + §14.3 (universal MUST = 1.0) + §15.3 (universal across all 4 round_kind)'
  notes: |
    Round 14 is the FIRST round to author Si-Chip's own core_goal_test_pack;
    Round 13 had no pack so the no-regression check is vacuously true per
    §14.3.2. Even though decision = keep (NOT half_retire), §14.7 hygiene
    requires every half_retire_decision instance to record the C0 invariant
