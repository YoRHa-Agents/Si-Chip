# ── §14.7 core_goal_invariant block (NEW v0.3.0-rc1) ────────────────────
# Per §14.7: when an ability is half_retired (this is NOT that case — Round 14
# is a `keep` decision), its core_goal_test_pack must be preserved as a
# cold-archive; reactivation requires C0 = 1.0 against current run. Even on
# `keep` decisions, recording the C0 invariant on every half_retire_decision
# instance is the §14.7 hygiene requirement (so future reactivation reviews
# have a documented C0 anchor for the "ability is still working" check).
