# ── Actions for Round 15 (measurement_only) ─────────────────────────────
actions:
  - id: round_15_a1
    action_id: round_15_a1
    title: 'Round 15 (measurement_only) — re-run core_goal_test_pack and assert C0 = 1.0 + monotonicity vs Round 14'
    priority: P1
    owner: Verify
    primitive: verify
    targets_metric: C0_core_goal_pass_rate
    applies_to_metric: C0_core_goal_pass_rate
    exit_criterion: |
      Round 15's metrics_report.yaml.core_goal_check satisfies:
        c0_pass_rate_this_round == 1.0 (per §14.3.1 universal MUST = 1.0)
        c0_pass_rate_prior_round == 1.0 (Round 14's value)
        c0_no_regression == true
        rollback_required == false
        cases_run == 5
        cases_passed == 5
        failed_case_ids == []
      Per §14.3.2: any decrease vs prior_round.C0 = round failure regardless
      of axis_status; per §15.3 measurement_only requires `C0 == 1.0 AND
      C0 == prior_round.C0`.
    description: |
      Round 15 (round_kind: measurement_only) MUST re-run the same
      core_goal_test_pack.yaml authored in Round 14 and assert C0 = 1.0 +
      monotonicity (no decrease vs Round 14's 1.0). Validates the
      no-regression invariant on the same source tree (no code changes
      between Rounds 14 and 15; only re-measurement). This is the FIRST
      monotonicity check ever performed for Si-Chip's core_goal — the
      Round 14 -> Round 15 pair is the Si-Chip self-witness for §14.3.2.

  - id: round_15_a2
    action_id: round_15_a2
    title: 'Round 15 — re-run spec_validator dual-spec; both MUST exit 0 with 11/11 BLOCKERs PASS'
    priority: P1
    owner: Verify
    primitive: verify
    targets_metric: spec_validator_dual_spec_pass
    applies_to_metric: spec_validator_dual_spec_pass
    exit_criterion: |
      Both invocations exit 0 AND both report verdict=PASS AND both list
      11 BLOCKERs all_passed=true:
        python tools/spec_validator.py --json
        python tools/spec_validator.py --spec .local/research/spec_v0.3.0-rc1.md --json
      Regression-guard for the Stage 4 wave 2a spec_validator extension
      landed in Round 14 (CORE_GOAL_FIELD_PRESENT + ROUND_KIND_TEMPLATE_VALID).
    description: |
      Round 15 MUST re-run spec_validator.py under both --spec
      .local/research/spec_v0.2.0.md and --spec
      .local/research/spec_v0.3.0-rc1.md; both MUST exit 0 with 11/11
      BLOCKERs PASS. This is the regression-guard for the spec_validator
      extension landed in Round 14 (per §13.5.4 acceptance criteria).

  - id: round_15_a3
    action_id: round_15_a3
    title: 'Round 15 — re-run governance_scan; assert V3_drift_signal == 0.0'
    priority: P2
    owner: Verify
    primitive: verify
    targets_metric: V3_drift_signal
    applies_to_metric: V3_drift_signal
    exit_criterion: |
      Round 15's metrics_report.yaml.metrics.governance_risk.V3_drift_signal
      equals 0.0; raw/governance_scan.json reports 3/3 SHA-256 byte-equality
      across .agents / .cursor / .claude SKILL.md mirrors.
      governance_risk_delta DERIVED LIVE = 0.0 (continuation of the Round 8
      audit-gap closure; per Round 13 / Round 14 convention).
    description: |
      Round 15 MUST re-run tools/governance_scan.py and assert
      V3_drift_signal == 0.0 across the 3 SKILL.md mirrors. This guards
      against accidental editor-saves desyncing the mirrors between
      Round 14 ship and Round 15 measurement. 15th consecutive
      ALL_TREES_DRIFT_ZERO round target.

