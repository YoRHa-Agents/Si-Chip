# ── §15.1 round_kind classification (THIS round = code_change) ──────────
# Note: this `round_kind` field describes ROUND 14 (the round the plan was
# emitted IN). The PLAN itself is for Round 15 (which will be measurement_only;
# see actions[*] below). Per spec §15.1 every next_action_plan.yaml carries
# the round_kind of its emitting round.
round_kind: code_change                               # NEW v0.3.0 §15.1; round 14 IS a code_change round
round_kind_rationale: |
  Round 14 modifies multiple ability source surfaces:
    - .local/research/spec_v0.3.0-rc1.md (NEW; 1216 lines)
    - .local/research/r11_core_goal_invariant.md (NEW; design brief)
    - templates/{basic_ability_profile.schema, iteration_delta_report.template,
      next_action_plan.template}.yaml (additive; $schema_version 0.1.0 -> 0.2.0)
    - tools/{cjk_trigger_eval, eval_skill, multi_handler_redundant_call,
      round_kind}.py + 4 sibling test files (NEW; 3134 LoC; 70 unit tests)
    - tools/spec_validator.py + tools/test_spec_validator.py (extended to
      11 BLOCKERs; CORE_GOAL_FIELD_PRESENT + ROUND_KIND_TEMPLATE_VALID added)
    - .agents/skills/si-chip/SKILL.md -> v0.3.0-rc1 (additive +47 lines)
    - .agents/skills/si-chip/references/{core-goal-invariant,round-kind,
      multi-ability-layout}-r11-summary.md + scripts/eval_skill_quickstart.md (NEW)
    - .cursor/skills/si-chip/* and .claude/skills/si-chip/* (mirror sync;
      SHA-256 byte-identical, V3_drift_signal re-verified 0.0)
  Per §15.1.2 decision tree: ability source files modified (Q1 = YES)
  AND not a release-finalization round (Q2 = NO; v0.3.0 final ship is a
  separate ship_prep round) -> round_kind = code_change.

# ── Inputs basis ─────────────────────────────────────────────────────────
