    positive_axis: false
    delta: 0.0
    rationale: 'U1-U4 carry Round 13.'
  routing_cost:
    positive_axis: false
    delta: 0.0
    rationale: |
      R3 carries Round 13 (canonical 6-case derivation). The Round 14 AUX
