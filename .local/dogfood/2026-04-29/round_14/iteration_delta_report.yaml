      metrics_report.routing_cost but NOT hoisted into canonical R3 (different
      prompt set + ability-boundary; would break round-to-round comparability).
  governance_risk:
    positive_axis: true
    delta: 0.05
    rationale: |
      v0.3.0-rc1 §14 core_goal invariant + §15 round_kind enum + §13.5.4
      acceptance criteria together add 2 NEW spec_validator BLOCKERs
      (CORE_GOAL_FIELD_PRESENT + ROUND_KIND_TEMPLATE_VALID), bringing the
      structural-drift gate from 9 BLOCKERs (v0.2.0) to 11 BLOCKERs
      (v0.3.0-rc1). The 2 new BLOCKERs catch:
        - missing or invalid core_goal block in basic_ability_profile.yaml
          (CORE_GOAL_FIELD_PRESENT)
        - missing or invalid round_kind in next_action_plan.yaml AND in
          iteration_delta_report.yaml templates (ROUND_KIND_TEMPLATE_VALID)
      at SPEC LINT time — i.e. before any metric is even computed. This
      structurally reduces governance_risk (drift_signal axis): future
      rounds cannot silently omit the §14 core_goal contract or write an
      invalid §15 round_kind value. Per §6.1 governance_risk_delta formula
      (`risk_without - risk_with`), adding gates that catch a known failure
      class at lint time = positive risk reduction. Magnitude: +0.05
      satisfies the v1_baseline bucket. Setting positive_axis: true.
      V3_drift_signal numerically stays 0.0 (3/3 mirror byte-equality
      post Stage 4 wave 2b mirror sync; per raw/governance_scan.json).

