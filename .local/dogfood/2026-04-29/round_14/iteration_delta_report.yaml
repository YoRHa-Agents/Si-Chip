      C4 hoist (3710 carry-forward to keep metric-space comparability),
      under which delta is 0. Setting positive_axis: false reflects the
      raw growth direction (more tokens = worse).
  latency_path:
    positive_axis: false
    delta: 0.0
    rationale: |
      L1/L2 carry-forward Round 13 (the deterministic 6-case runs are not
      rerun this round). The eval_skill.py harness L1=L2=2.8879s recorded
      in raw/eval_skill_output.yaml is the FUNCTIONAL TEST runtime
      (pytest), NOT the per-case L1; not hoisted into canonical L1/L2.
  generalizability:
    positive_axis: true
    delta: 0.05
    rationale: |
      v0.3.0-rc1 §16 multi-ability layout (Informative @ v0.3.0; Normative
      target @ v0.3.x) enables Si-Chip's first parallel ability dogfood
      under one harness. tools/eval_skill.py replaces the 768-line
      ability-specific eval_chip_usage_helper.py with a CLI that takes
      `--ability <id> --skill-md <path> --vocabulary <path> --eval-pack
      <path> --core-goal-test-pack <path>` and works for ANY ability
      (chip-usage-helper Rounds 1-14 + Si-Chip Round 14 share the same
      generic harness this round). This is a genuine generalizability
      improvement: measurement surface expands from 1 ability to 2 (and
      to N going forward). Axis +0.05 satisfies the v1_baseline bucket.
      Note: G1 / G2 / G3 / G4 numerical sub-metric values do NOT move this
      round (G1 still carries the 2-model x 2-pack PARTIAL PROXY); the
      axis-level improvement is at the HARNESS / LAYOUT level, not the
      sub-metric numerics.
