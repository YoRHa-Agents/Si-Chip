# Si-Chip Trigger Vocabulary — Round 14 (v0.3.0-rc1 multi-ability layout §16.1)
# Feeds tools/cjk_trigger_eval.py + tools/eval_skill.py R1/R2/R3/R4.
# Derived from SKILL.md "When To Trigger" / "When NOT To Trigger" sections.
#
# Vocabulary schema (see tools/cjk_trigger_eval.py Vocabulary dataclass):
#   ascii_anchors       strong ASCII triggers — any match fires YES
#   ascii_weak          weak ASCII hits — accumulate with cjk_weak; threshold = min_weak_hits
#   cjk_strong          strong CJK substrings — any match fires YES
#   cjk_weak            weak CJK hits — accumulate with ascii_weak
#   discriminators      ordered anti-trigger rules (suppress FP); applied BEFORE strong anchors
#   slash_commands      short-circuit YES (Si-Chip has none)
#   min_weak_hits       threshold for Phase-6 weak-accumulation path

ascii_anchors:
  # v0.2.0 core nouns
  - router_floor
  - core_goal
  - metrics_report
  - iteration_delta
  - reactivation
  - basicability            # "BasicAbility" lowercases to this single token
  - dogfood
  # v0.3.0 §14/§15 additions
  - round_kind
  - measurement_only
  - core_goal_test_pack

ascii_weak:
  - evaluate
  - eval
  - retire
  - diagnose
  - profile
  - skill
  - round
  - plan
  - compare
  - half
  - review

cjk_strong:
  - 半退役
  - 路由层
  - 核心目标
  - 迭代增量
  - 指标报告
  - 回归检查
  - 下一轮计划
  - 下一轮行动

cjk_weak:
  - 技能
  - 评估
  - 规格
  - 门槛
  - 指标

slash_commands: []

# Discriminators run BEFORE strong anchors (phase 2 in trigger_match).
# Each rule fires (= suppresses the prompt with match=False) when its
# `if_token_in_prompt` set hits AND any `and_any_token_in_prompt` (if
# present) hits. See tools/cjk_trigger_eval.py::_apply_custom_discriminator.

discriminators:
  # §11.1 forever-out — marketplace / plugin publish
  - name: marketplace_publish
    if_token_in_prompt: [marketplace, publish]
    and_any_token_in_prompt: [skill, plugin, marketplace, publish, 商店]
    or_cjk_substring_in_prompt:
      - 商店
      - 发布到
    rule: "Marketplace / distribution-surface requests are §11.1 forever-out; NEVER trigger Si-Chip on them."

  # §11.1 forever-out — router model training
  - name: router_model_training
    if_token_in_prompt: [train]
    and_any_token_in_prompt: [router, model, ranker, classifier]
    rule: "Training a router model or ranker is §11.1 forever-out."

  # §11.1 forever-out — markdown-to-CLI auto-conversion
  - name: markdown_to_cli_converter
    if_token_in_prompt: [markdown, md]
    and_any_token_in_prompt: [cli, command, converter, convert, bash, shell]
    rule: "Auto-converting Markdown into a CLI is §11.1 forever-out."

  # SKILL.md 'When NOT To Trigger' #5: "just write this Python file"
  - name: implementation_only
    if_token_in_prompt: [just]
    and_any_token_in_prompt: [write, writing, implement, code, python, file, bug, fix]
    or_cjk_substring_in_prompt:
      - 只写
      - 只是写
    rule: "Pure implementation requests with no eval / dogfood goal should NOT trigger Si-Chip."

min_weak_hits: 2

provenance:
  authored_at: '2026-04-29T10:55:00+00:00'
  authored_by: 'round_14 dogfood L3 Task Agent'
  spec_version: v0.3.0-rc1
  derived_from: .agents/skills/si-chip/SKILL.md
  layout_section: v0.3.0-rc1 §16.1 multi-ability directory layout
