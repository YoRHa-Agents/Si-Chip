rationale: |
  This is a STRUCTURAL refactor round, not a token-economy or trigger-correctness round.
  The migration to ai-bill aggregate REST API removes ~1630 LOC of client-side code
  (4 aggregators + 1 sync layer + 1 CLI + 1 ingest pipeline + 1 repo + 1 identity
  helper + 1 sync_usage_events tool) and adds 8 new MCP tools (~333 LOC). The canvas
  template gains 4 new conditionally-rendered sections.

  T1 still measures correctness (130/130 pass), but C4 / L2 / R3 / R6 / R7 metrics
  are intentionally NOT re-measured this round because the payload SHAPE has changed
  (e.g. agentHoursRankings.weekly is now monthly-snapshot semantics; week.perModel
  is monthly-keyed; rankings.weekly is single-day diff). Re-baselining against the
  new shape is what round 27 is for; carrying forward round 19 numbers as if they
  applied to v1.2.0 would mislead the gate-promotion decision.

  Per spec §15.2 (round_kind clause), this round is `code_change` with axis-mixed
  intent: T1 must hold (and does), token/context/path axes are EXPECTED to improve
  (and the value_vector estimates them positive at +0.05 each, meeting the v1_baseline
  ≥+0.05 threshold per §6 half-retire bucket), but the precise C4/L2 measurements are
  deferred to round 27 by design.

