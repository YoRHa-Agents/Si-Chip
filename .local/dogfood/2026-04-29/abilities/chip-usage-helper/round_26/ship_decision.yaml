semver_rationale: |
  MINOR (1.2.0) is correct under SemVer:
  - PUBLIC API SURFACE GROWS: 8 new MCP tools (LiteLLM ×4, cross-source me/team ×3, my-tasks ×1)
  - PUBLIC API SURFACE BREAKS-FOR-INTERNAL: sync_usage_events tool removed, aggregator/sync/ingest
    pipelines removed, usage_events SQLite table dropped — but NONE of these are documented as
    user-facing surface (the documented dashboard recipe in README/user-guide.md never invoked
    them directly). Hence "BREAKING for internals; backward-compatible for the dashboard recipe".
  - Existing public tools (get_dashboard_data, get_week_usage, etc.) preserve their EXTERNAL
    contract (return shapes annotated with v1.2.0 trade-off fields like serverThresholdSemantics
    and perModelScope to disambiguate semantic shifts).
  - This is therefore a MINOR (additive + non-breaking-public) bump, not a MAJOR.

rationale: "ai-bill aggregate REST API migration complete; 16 tools (was 9, +8 new −1 sync_usage_events); 130/130 tests; client surface −10 client-runtime files / +8 wrapper tool files (~−1297 LOC at file boundaries; mcp/src net +752 LOC due to existing tool growth around new endpoints; combined source net +38 LOC); +8 cross-source tools open 4 new conditional canvas sections without disturbing the original 4-card layout."

migration_axis_tracking:                # NEW field (Cycle 6 meta-feedback R48 to be codified in SUMMARY.md): track BREAKING vs additive per dimension
  data_layer:
    classification: BREAKING_INTERNAL_BACKWARD_COMPATIBLE_PUBLIC
    detail: "Client no longer calls /cursor/events; all data sourced from /api/v1/cursor/*, /litellm/*, /me/*, /team/* aggregate endpoints. usage_events SQLite table dropped. Public dashboard recipe unchanged."
  tool_surface:
    classification: ADDITIVE
    detail: "+8 new tools, −1 internal tool (sync_usage_events). Net +7 public tools."
  payload_semantics:
    classification: ANNOTATED_SHIFT
    detail: |
      agentHoursRankings.weekly is now monthly-snapshot semantics (annotated inline);
      week.perModel is monthly-keyed (perModelScope='monthly_calendar' field signals shift);
      get_agent_hours thresholds[] accepted-but-server-side-fixed (serverThresholdSemantics='fixed_server_side' field signals);
      agentHours.matrix (7×24 weekday/hour) zero-filled placeholder (use new get_my_tasks.hourOfDay[]);
      rankings.weekly is single-day diff not 7-day rolling;
      get_month_totals exposes totalRequests instead of cents/dollars.
  identity_layer:
    classification: ADDITIVE_FAIL_LOUD
    detail: "X-User-Name header now CRITICAL for get_me_summary + get_my_tasks; clear hard-fail with descriptive error if unresolvable. Per workspace rule No Silent Failures."
  governance:
    classification: ADDITIVE_NARROWING
    detail: "CHIP_USAGE_SYNC_* env vars no longer consumed; permission scope narrowed by removing events ingest path."

