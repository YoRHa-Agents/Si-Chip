axis_status:
  task_quality:
    positive_axis: false
    delta: 0.0
    rationale: |
      Refactor / API migration — same end-user task, same correctness floor (130/130 PASS).
      T1 stayed at 1.00 (was 1.00 in round 25 — every release round in cycle 5 was 1.00).
      T3 carried forward as 0.92 (no-ability baseline assessment unchanged this round; round 29
      will re-baseline against a scenario pack that exercises the 4 new canvas sections).
  context_economy:
    positive_axis: true
    delta: '~+0.05_estimated'
    rationale: |
      Client no longer paginates /cursor/events; the new /api/v1/cursor/usage/by-user and
      /api/v1/cursor/spend/* aggregate endpoints return ONE document per dashboard window
      (vs N event pages × per-event payload). Estimated -200KB SQLite session-disk-cache
      (usage_events table dropped). Round 27 will measure C4 against the new payload shape.
  latency_path:
    positive_axis: true
    delta: '~+0.05_estimated'
    rationale: |
      Pagination loop removed; client roundtrip count drops from "1 + N" to "1" per dashboard
      window. Round 27 will wall-clock the actual aggregate endpoints; expected p95 ≤ round 19's
      1.78s (the v0.9.0 baseline) and likely better.
  generalizability:
    positive_axis: true        # +8 tools = wider task surface; lifecycle promoted to productized
    delta: 'qualitative_+8_tools'
    rationale: |
      8 NEW MCP tools cover LiteLLM (×4), cross-source me/team summary (×3), personal task
      drill-down (×1). Plugin now serves a strictly larger task surface than v1.1.0 — including
      questions that previously required the user to manually combine Cursor + LiteLLM bills.
  usage_cost:
    positive_axis: false
    delta: 0.0
    rationale: "Setup steps unchanged (3); env var surface narrowed (CHIP_USAGE_SYNC_* removed)"
  routing_cost:
    positive_axis: false
    delta: 0.0
    rationale: "Trigger vocab + SKILL.md When/Skip lists unchanged this round"
  governance_risk:
    positive_axis: true
    delta: '~+0.05_estimated'
    rationale: "usage_events SQLite table dropped → smaller blast radius if cache is exfiltrated; CHIP_USAGE_SYNC_* env vars no longer consumed → smaller config surface"

