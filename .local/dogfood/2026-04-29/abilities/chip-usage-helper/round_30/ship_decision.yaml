semver_rationale: |
  MAJOR (2.0.0-pre) is the final marker for the v1.x ai-bill REST migration arc:
  - The v1.2.0 ship (round 26) shipped the migration with INTERNAL breaking changes
    (sync_usage_events removed, aggregator pipeline removed, usage_events SQLite
    table dropped) classified as `BREAKING_INTERNAL_BACKWARD_COMPATIBLE_PUBLIC` —
    SemVer-compliant as MINOR because the documented dashboard recipe in
    README/user-guide.md kept working.
  - However, the cumulative v1.0.0 → v1.2.0 surface change is large enough that
    a major-bump marker is appropriate for the major-version audience: the wire
    protocol changed, the on-disk SQLite schema lost a table, the internal client
    aggregators are gone, env vars were dropped, and X-User-Name became a
    primary identity signal with REQUIRED-on-some-endpoints semantics. A
    consumer pinning to v1.x and upgrading blindly to v2.x SHOULD see a major
    bump as a "review the integration" signal.
  - The "-pre" suffix is the conservative finishing move: it ships the major-bump
    marker WITHOUT yet committing to a v2.0.0 stable label. Cycle 7 production
    validation will baseline the missing axes (C4 firmer, L2 against real ai-bill);
    if green, v2.0.0 stable follows. If a regression surfaces, v2.0.1-pre with a
    fix.
  - npm did NOT reject `2.0.0-pre`. SemVer §9 allows pre-release identifiers
    `[0-9A-Za-z-]+`; npm@10 honored it. We did NOT need the `2.0.0-pre.0`
    fallback the dispatch instruction §30.2 prepared.

rationale: "v2.0.0-pre — major bump finalising the ai-bill REST migration arc; 16 tools, 133/133 tests, −1211 net tokens, identity flow documented, BREAKING changes restated for major audience"

