ability_id: chip-usage-helper
emitted_at: '2026-04-30T01:35:00+08:00'
targets_round: cycle_7_production_validation
bound_gate: v1_baseline                       # remain at v1_baseline through Cycle 7; v2_tightened pursuit deferred to Cycle 8
target_branch: main                           # v2.0.0-pre ships from feature/v1.2.0-api-migration; subsequent production-validation may trigger feature/v2.0.0-stable-prep or hotfix branches
round_kind: maintenance                       # post-v2.0.0-pre roadmap is maintenance / measurement, not new feature work

# Post-v2.0.0-pre roadmap (Cycle 7+)

actions:
  - action_id: cycle_7_production_validation
    priority: P1
    description: |
      Monitor v2.0.0-pre install + use for 1-2 weeks. Track install
      success across at least 3 user installs (preferred) and run
      end-to-end "ask the dashboard" tests against the live ai-bill
      backend. Verify:
        - Cursor plugin scan finds the extracted
          chip-usage-helper-2.0.0-pre/ directory and registers the
          MCP server.
        - mcp/dist/index.js starts under Node 22.5+ (node:sqlite path)
          AND under Node 20 with the optional better-sqlite3 install.
        - resolveMe() picks up the IDE cached email on first run for
          fresh installs (no env override required).
        - The 6 dashboard recipe prompts (我的 cursor 用量? / 本月花了多少? /
          agent 工时占比? / 本月在 LiteLLM 上花了多少? / 团队 LiteLLM 谁用得最多? /
          我今天做了几个长任务?) all return non-empty canvases.
        - X-User-Name flows correctly to /me/summary, /events/tasks/me
          (REQUIRED) + the 5 OPTIONAL endpoints.
        - The new H2 'Cross-source & advanced' grouping renders
          correctly with 0/1/2/3/4 supplementary sections active.
        - The MoreRowsFooter '+N more' truncation indicator fires when
          a leaderboard has > 10 entries.

      Decision criteria for v2.0.0 stable promotion (next dispatch):
        - 0 install regressions across at least 3 user installs
        - 0 identity-flow regressions (X-User-Name correctly populates)
        - 0 canvas render regressions (with 0-4 supplementary sections)
        - upstream-empty recovery validated end-to-end at least once
        - no corner-case crashes in tool handlers

      If green for 1-2 weeks: bump v2.0.0-pre → v2.0.0 stable (drop
      the -pre suffix; ship as a regular version-bump round).

      If a regression surfaces: bump v2.0.1-pre with the fix; loop
      back to validation. half_retire_decision.yaml triggers list
      already includes `production_install_regression_surfaced`.
    success_criteria:
      - "Cycle 7 SUMMARY.md update covers ≥1 week of v2.0.0-pre install usage"
      - "v2.0.0 stable shipped IFF criteria above are met"
      - "Cycle 7 production validation evidence dir created at .local/dogfood/<DATE>/abilities/chip-usage-helper/round_31/"
    estimated_round: 31
    target_branch: feature/v2.0.0-stable-prep (if green) | feature/v2.0.1-pre-fix (if regression)

  - action_id: round_32_identity_flow_code_refactor
    priority: P2
    description: |
      Cycle 8 — the deferred identity-flow code refactor (originally
      planned in round 26 next_action_plan; round 29's doc-only
      consolidation is the precursor). Extract a single
      `resolveIdentity()` function consumed by all me-/team-/my-tasks
      tools. Cache the resolution result for the duration of a single
      MCP session.

      Currently:
        - get_me runs the env > IDE > CLI > alias > cache resolution
        - get_me_summary calls resolveMe() then injects X-User-Name
        - get_my_tasks calls resolveMe() then injects X-User-Name
        - diagnose_identity does its own resolution + ai-bill upstream probe
      ⇒ if a dashboard render needs cross-source totals + my-tasks
      drill-down, identity is resolved 3 times (get_me + get_me_summary
      + get_my_tasks). L4 (redundant_call_ratio) is currently UNMEASURED
      for v2.0.0-pre but this is a likely culprit.

      Round 32+ should:
      1. Extract a `resolveIdentity()` function consumed by all tools
         that need X-User-Name. Cache the resolution result for the
         duration of a single MCP session.
      2. Remove the per-tool resolution chain code (currently inlined
         in each of get_me / get_me_summary / get_my_tasks).
      3. Re-baseline T3 against an expanded scenario pack covering
         cross-source / personal-task vocabulary.
      4. Re-measure L2 wall_clock_p95 against a deterministic
         invocation harness.
      5. Re-baseline C4 per_invocation_footprint with the consolidated
         identity resolver — expected to drop ~200-500 tokens per
         invocation that uses multiple cross-source tools.

      Acceptance: C4 ≤ 7000 tokens (clears v2_tightened threshold);
      L4 redundant_call_ratio measured + ≥ +0.10 (clears v2_tightened
      iteration_delta on a single efficiency axis).
    success_criteria:
      - "Single `resolveIdentity()` function consumed by all me-/team-/my-tasks tools"
      - "T3_baseline_delta re-measured ≥ +0.92 against expanded scenario pack"
      - "L2 wall_clock_p95 ≤ 1.5 s"
      - "C4 per_invocation_footprint ≤ 7000 (would clear v2_tightened threshold)"
      - "v2_tightened gate promotion attempted"
    estimated_round: 32
    target_branch: feature/v2.1.0-identity-refactor
    optional: false

  - action_id: round_33_c4_deterministic_harness
    priority: P3
    description: |
      Add a deterministic invocation harness for C4 per_invocation_footprint.
      Currently estimated as ~5500-7500 tokens (eager + on-call + tools/list
      + get_dashboard_data response). The estimation is conservative because:
      - tools/list is paid ONCE per MCP session, then cached → amortised
      - rules + SKILL bodies are paid only when the SKILL is routed
      - get_dashboard_data response varies with team size (10-100 users) and window

      A deterministic harness should:
        1. Spin up a mock MCP server with msw fixtures sized for typical team
        2. Run the dashboard recipe end-to-end (rules trigger → SKILL routing →
           get_dashboard_data → optional supplementary tools)
        3. Sum tiktoken-cl100k_base counts at each agent-visible boundary
        4. Output C4 per invocation type (basic / cross-source / my-tasks / full)
    success_criteria:
      - "Harness measures C4 with ≤ ±5% variance across 10 runs"
      - "C4 firmed up vs rounds 27-30 estimates"
    estimated_round: 33
    optional: true

