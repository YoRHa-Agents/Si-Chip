# chip-usage-helper — Round 1 half-retirement decision
# Spec §6.1 seven-axis value vector + §6.2 rule evaluation.
ability_id: chip-usage-helper
version: '0.6.1+round_1'
decided_at: '2026-04-29T04:56:00+00:00'
decision: keep

# §6.1 frozen 7-axis value vector (computed vs no_ability_baseline)
value_vector:
  task_delta: 0.80              # T3: pass_with(0.85) - pass_without(0.05) = 0.80
  token_delta: null             # Round 1 baseline; no reference point from prior round. Token delta vs "no-ability token cost" is meaningless here (baseline uses Cursor-only context, ~0 tokens for this task because it just fails).
  latency_delta: null           # same rationale as token_delta
  context_delta: null           # same rationale as token_delta
  path_efficiency_delta: null   # L5 detour_index not measured
  routing_delta: 0.9524         # R3 trigger_F1 with chip-usage-helper (0.9524) - trigger_F1 without (0.0); chip-usage-helper gives full routing coverage on 40-prompt pack
  governance_risk_delta: 0.0    # no delta vs baseline (baseline has no governance risk because it has no behavior; with-ability adds controlled 2-host egress and 1 SQLite cache, flagged but within accepted scope)

# §6.2 rule evaluation
rule_evaluation:
  spec_section: "§6.2"
  bound_gate: v1_baseline
  bucket_threshold: 0.05  # v1_baseline iteration_delta bucket (first efficiency axis)
  fired_rule: keep
  fired_condition: "task_delta +0.80 >= +0.10 (keep condition fires)"
  other_rules_checked:
    half_retire: "NOT FIRED (task_delta +0.80 is well outside near-zero band [-0.02, +0.10])"
    retire: "NOT FIRED (task_delta strictly positive; routing_delta strictly positive)"
    disable_auto_trigger: "NOT FIRED (governance_risk_delta = 0.0, not materially negative)"

simplification:
  applied: []                    # keep decision; no simplification
  bound_gate: v1_baseline

retained_core:
  - "SKILL.md (86 meta + 1854 body tokens)"
  - "usage-helper.mdc routing rule (40 meta + 557 body)"
  - "commands/usage-report.md slash command (45 meta + 268 body)"
  - "7 MCP tools (get_me, get_week_usage, get_month_totals, get_agent_hours, get_rankings, get_dashboard_data, sync_usage_events)"
  - "canvas template usage.canvas.template.tsx"
  - "16 test suites (96 tests, 100% pass)"

review:
  next_review_at: '2026-05-29'   # today + 30 days (spec §6 cadence 30/60/90)
  triggers:
    - new_model_no_ability_baseline_gap          # §6.4 trigger 1
    - new_scenario_or_domain_match               # §6.4 trigger 2
    - router_test_requires_ability_for_cheap_model  # §6.4 trigger 3
    - efficiency_axis_becomes_significant        # §6.4 trigger 4
    - upstream_api_change_wrapper_stabilizes     # §6.4 trigger 5
    - manual_invocation_rebound                  # §6.4 trigger 6

provenance:
  round_id: round_1
  prior_round_id: null           # first round vs no_ability_baseline
  metrics_report_path: .local/dogfood/2026-04-29/abilities/chip-usage-helper/round_1/metrics_report.yaml
  router_floor_report_path: .local/dogfood/2026-04-29/abilities/chip-usage-helper/round_1/router_floor_report.yaml
  decided_by: "si-chip.self_eval (chip-usage-helper round_1, manual orchestration)"
  spec_version: v0.1.0
  target_repo: /home/agent/workspace/ChipPlugins/chips/chip_usage_helper
  target_branch: feature/si-chip

rationale: |
  chip-usage-helper provides a clear task_delta = +0.80 (with-ability pass_rate 0.85 vs
  no-ability baseline 0.05) — a strong value proposition. The skill passes §6.2 "keep"
  condition (task_delta >= +0.10) by a wide margin. However, R3 trigger_F1 = 0.7778 fails
  the v1_baseline gate threshold (>= 0.80) by 0.0222 due to CJK trigger vocabulary gaps.
  This is explicitly targeted in Round 2 (next_action_plan.yaml action a1). Efficiency-axis
  deltas (token_delta, latency_delta, context_delta) are marked null this round because
  Round 1 is the baseline — deltas will be computed in Round 2+ vs this round. No
  reactivation triggers fire on a "keep" decision; all 6 standard §6.4 triggers remain
  on watch through 2026-05-29.
