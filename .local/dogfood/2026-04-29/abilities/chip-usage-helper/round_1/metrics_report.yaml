methodology_note: |
  Round 1 evaluator was iterated ONCE during the round to fix a CJK-tokenization bug: the
  initial bag-of-words classifier split on non-word characters, which corrupted continuous
  Han-ideograph blocks into single unmatched tokens. Fixed evaluator uses (a) substring
  search for CJK phrases from the skill description vocabulary + (b) a "cursor+usage-meta"
  discriminator to suppress "explain Cursor Composer"-style false positives. Eval pack was
  also expanded from 20 prompts to 40 to exercise near-miss edge cases.
  Pre-fix: R3=0.7778 (3 CJK misses, 1 cursor-meta FP). Post-fix + expanded pack: R3=0.9524.
  The 0.7778 figure is preserved in .local/dogfood/2026-04-29/abilities/chip-usage-helper/
  round_1/raw/eval_metrics_v2.json as the first-pass artifact.

# ─ Supporting metric derivations ─
derivations:
  C1_C4: "count_tokens.py (tiktoken backend) on SKILL.md + usage-helper.mdc. C4 = skill(meta+body) + rule(meta+body). Command .md is on-demand slash-invocation, tracked separately (45+268=313 tokens)."
  L1_L2: "3 runs of `npm test` (96 tests each), measured wall-clock of each run; p50=median(runs), p95=max(runs) given small-N sample."
  R1_R3_R4: "CJK-aware deterministic trigger classifier. Vocabulary: (a) ASCII tokens from skill description + strong-keyword set; (b) CJK substrings harvested from skill description + routing-rule body (re.findall [Han-run-2-to-6-chars]). Discriminator: 'cursor' alone with {composer, settings, extension, keybinding, update, install} -> NO MATCH (cursor-meta-discriminator). Match rule: slash_command > strong_ascii > strong_cjk > cursor+cjk > weak_hits (>=2)."
  R5: "composer_2/fast selected because skill is description-first markdown; no extended reasoning required at trigger time; body=1854 tokens fits fast-tier context."
  T1: "Blend of (a) 96/96 unit+integration test pass (mocked ai-bill) = 1.0, (b) 38/40 trigger eval pass = 0.95. Conservative composite = 0.90."
  T2: "Same as T1 for k=4 (deterministic test suite has zero variance across reruns; trigger classifier is deterministic). Equals T1."
  T3: "pass_with(0.90) − pass_without(0.05) = 0.85."
  V1: "grep for fs.writeFileSync / INSERT / UPDATE / DELETE in mcp/src + SQL migrations. One SQLite DB at ~/.chip_usage_helper/cache.db (6 tables); no direct filesystem writes from MCP source (cache driver owns the DB file); 2 outbound HTTPS hosts identified by regex https?:// in source."
  V2: "grep for {authInfo.email, accessToken, refreshToken, openAIKey, cachedEmail, NDS_TOKEN, Authorization, bearer} in mcp/src. 27 total refs; manual audit shows none are persisted (only transient reads into memory for current request)."

