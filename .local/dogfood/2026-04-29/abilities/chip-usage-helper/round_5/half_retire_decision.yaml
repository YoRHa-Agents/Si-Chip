decision: keep

value_vector:
  task_delta: 0.92            # T1 with-skill 0.97 vs no-ability ~0.05 (matches dashboard query? mostly NO without the rule)
  token_delta: 0.0            # no body change vs round 4
  latency_delta: 0.0322       # (1.866 - 1.806)/1.866; small but positive
  context_delta: 0.0
  path_efficiency_delta: 1.0  # (0.0909 - 0.0)/0.0909 = 1.0 — perfect elimination
