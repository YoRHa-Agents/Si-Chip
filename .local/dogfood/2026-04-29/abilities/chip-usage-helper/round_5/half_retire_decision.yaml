    retire: "NOT FIRED (multiple axes positive: task=0.92, path=1.0, routing=1.0)"
    disable_auto_trigger: "NOT FIRED (governance_risk_delta = 0.0)"
  round_5_axis_movement:
    path_efficiency_delta: "+1.0 round-on-round (Round 4: 0.909 measured against eliminating one of two redundant calls; Round 5: full elimination -> path_efficiency_delta saturates at 1.0)"
    latency_delta: "+0.0322 (small but real; under v2_tightened bucket 0.10 by itself but combined with path_efficiency saturation is the dominant signal)"

simplification:
