rationale: |
  Round 5 keeps the chip-usage-helper ability because (a) task_delta remains huge (+0.92 vs
  the no-ability baseline — the routing rule + skill is the difference between "agent
  searches the web" and "agent fires get_dashboard_data"), and (b) Round 5 lands the
  cleanest single-round path-efficiency win seen yet: L4 0.0909 -> 0.0 (full elimination of
  the two redundant SQLite calls in get_dashboard_data). Latency p95 also ticked down 3%.
  No regressions in any other axis; 99/99 tests still green.
