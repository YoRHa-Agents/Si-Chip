ability_id: chip-usage-helper
emitted_at: '2026-04-30T01:25:00+08:00'
targets_round: round_30_v2_0_0_pre_release
bound_gate: v1_baseline                       # round 30 ships at v1_baseline; v2_tightened pursued post-release in Cycle 7
target_branch: feature/v1.2.0-api-migration   # SAME branch (round 30 v2.0.0-pre commit stacks)
round_kind: ship_prep                         # per spec §15 + §17 hard rule 10 — round 30 is the v2.0.0-pre release commit (version bump + CHANGELOG + tarball + smoke)

# This dispatch combines round 29 (identity-flow doc) + round 30 (v2.0.0-pre release).
# Plan covers rounds 30 (in-progress this dispatch), 31 (post-release monitoring), and 32 (v2.1.0 spec).

actions:
  - action_id: round_30_v2_0_0_pre_release
    priority: P0
    description: |
      v2.0.0-pre is the major-version pre-release marker for the v1.x
      ai-bill REST migration arc. The "-pre" suffix indicates this is
      the first major-bump tarball but NOT the v2.0.0 stable release —
      production validation is pending; v2.0.0 stable will follow if no
      regressions surface in 1-2 weeks of production usage.

      Bump anchors (10):
        1. mcp/package.json "version"
        2. package.json "version" + scripts.package:inspect tarball name
        3. .cursor-plugin/plugin.json "version"
        4. scripts/package-plugin.mjs const VERSION
        5. scripts/package-smoke-test.mjs const VERSION
        6. mcp/src/index.ts server constructor version
        7. mcp/package-lock.json self-version (top + lockfile workspace entry)
        8. README.md install paths (1.2.0 → 2.0.0-pre)
        9. docs/user-guide.md install paths
        10. docs/admin-integration-guide.md install paths

      CHANGELOG.md gets a new "v2.0.0-pre (2026-04-29)" entry above the
      v1.2.0 entry, restating breaking changes for the major-version
      audience and crediting Si-Chip dogfood rounds 27, 28, 29 for the
      polish work.

      Build + smoke-test the tarball: `npm run package` then
      `npm run package:smoke` (must pass with 16 tools detected).
    success_criteria:
      - "All 10 anchors at 2.0.0-pre"
      - "CHANGELOG.md v2.0.0-pre entry above v1.2.0 entry"
      - "dist/chip-usage-helper-2.0.0-pre.tgz exists"
      - "npm run package:smoke passes with 16 tools detected"
      - "133/133 tests still PASS post-bump"
      - "tsc --noEmit clean post-bump"
    estimated_round: 30
    target_branch: feature/v1.2.0-api-migration

  - action_id: round_31_post_release_monitoring
    priority: P2
    description: |
      Cycle 7 — Production validation. Monitor v2.0.0-pre install usage
      for 1-2 weeks. Track:
        - install error reports (Cursor plugin scan failures, missing
          mcp/dist/index.js, sqlite native-build failures on Node 20)
        - identity-flow regressions (X-User-Name unavailable on first
          run for fresh installs; resolveMe falling through to "none"
          when env + IDE + CLI all empty)
        - canvas render regressions (the new H2 'Cross-source &
          advanced' grouping under varying supplementary section
          combinations; truncation indicators on tables)
        - upstream-empty / upstream-stale recovery (the diagnose_identity
          4-action surface should fire correctly when ai-bill is empty
          or stale)

      Decision criteria for v2.0.0 stable promotion:
        - 0 install regressions across at least 3 user installs
        - 0 identity-flow regressions
        - 0 canvas render regressions
        - upstream-empty recovery validated end-to-end at least once

      If green for 1-2 weeks: promote v2.0.0-pre → v2.0.0 stable
      (drop the -pre suffix; ship as a regular version-bump round).

      If a regression surfaces: bump v2.0.1-pre with the fix; loop
      back to validation.
    success_criteria:
      - "Production validation report (Cycle 7 SUMMARY.md update) covers ≥1 week of v2.0.0-pre install usage"
      - "v2.0.0 stable shipped IFF criteria above are met"
    estimated_round: 31
    optional: true

  - action_id: round_32_v2_1_0_spec
    priority: P3
    description: |
      Once v2.0.0 stable lands (round 31 success), draft a v2.1.0 spec
      for the NEXT major feature surface. Candidate areas based on
      Cycle 6 round 26 next_action_plan.yaml's deferred items:
        - Identity flow consolidation refactor (extract single
          resolveIdentity() function; cache for MCP session lifetime;
          measure L4 redundant_call_ratio improvement). Round 29's
          doc-only consolidation is the precursor; the actual code
          extraction is deferred.
        - Deterministic invocation harness for C4 per_invocation_footprint
          firm-up (target ≤ 7000 to clear v2_tightened gate).
        - Cross-source rankings deep-link (clicking a user in
          team/summary opens their per-user breakdown — currently the
          canvas only shows top-N).
        - SLA / latency observability surface (expose ai-bill upstream
          latency p50/p95 in get_dashboard_data response so the canvas
          can show "ai-bill response: 320ms p50 / 1.2s p95").
    success_criteria:
      - "v2.1.0 spec drafted with concrete acceptance criteria + acceptance test plan"
      - "Si-Chip dogfood Cycle 8 plan with rounds 33-N committed"
    estimated_round: 32
    optional: true

provenance:
