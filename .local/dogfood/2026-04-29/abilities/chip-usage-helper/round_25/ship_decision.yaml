  This branch is stacked on top of `feature/v1.0.0-team-leaderboards` (MR #8) so
  the diff against main shows BOTH v1.0.0 (4-card team rankings) AND v1.1.0
  (upstream-health) work. User can merge either:
  (a) MR #8 first (v1.0.0) then this MR (v1.1.0 delta), or
  (b) this MR alone (delivers both v1.0.0 + v1.1.0 to main in one merge).

