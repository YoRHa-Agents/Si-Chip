  - action_id: a2
    priority: P0
    targets_metric: U4_time_to_first_success
    current: null
    expected: "<= 60 s on a warm machine"
    description: |
      Time the smoke install: from `npm ci` to first successful tools/list response.
      Already approximated by the test suite (~1.7 s for the contract test); the
      "real" install includes npm dependency resolution which adds ~30-90 s on a cold cache.
      For this round: U4 = wall-time of `npm test --reporter=basic` from a clean state.
    scope_writable_files:
      - .local/dogfood/2026-04-29/abilities/chip-usage-helper/tools/eval_chip_usage_helper.py
    acceptance_criteria:
      - "U4 populated (seconds, in [0, 600])"

  - action_id: a3
    priority: P1
    targets_metric: L5_detour_index
    current: null
    description: |
      L5 detour_index measures how many "wrong-path" calls the agent makes before
      converging. For a deterministic single-tool flow (always invoke
      get_dashboard_data), L5 = 0 by construction. Helper added to record this
      explicit zero (with rationale), not null.
    scope_writable_files:
      - .local/dogfood/2026-04-29/abilities/chip-usage-helper/tools/eval_chip_usage_helper.py
    acceptance_criteria:
      - "L5 populated (in [0, 1])"

