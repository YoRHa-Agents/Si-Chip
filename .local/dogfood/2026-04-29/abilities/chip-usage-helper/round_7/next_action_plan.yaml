    priority: P0
    targets_metric: U3_setup_steps_count
    current: null
    expected: "<= 3 (matches README install instructions)"
    description: |
      Count the number of explicit user steps to go from "clone repo" to "first MCP call":
        1. cd .../mcp; npm ci
        2. cursor: /add-plugin /path/to/chip_usage_helper
        3. ask "show my cursor usage"
      That's 3 steps — should pass v1_baseline ceiling 5.
    scope_writable_files:
