# Rounds 28-30 plan, anchored on the post-v1.2.0 cycle plan from round_26/next_action_plan.yaml.
# This round_27/next_action_plan.yaml refines the round 28 plan based on what round 27
# learned (specifically: the canvas template body grew +2069 tokens / +37 lines after trim
# but is still 7439 tokens — by far the largest LAZY-tier file).

actions:
  - action_id: round_28_canvas_information_density_review
    priority: P1
    description: |
      Inspect templates/usage.canvas.template.tsx end-to-end and apply targeted info-density
      improvements per dispatch §28.1-§28.2:

      1. Group the 4 conditional supplementary sections under a single visual header
         "Cross-source & advanced" — they currently render as 4 standalone H2 sections
         each preceded by a Divider. With all 4 active the canvas is 8 H2 sections of
         vertical scroll; a grouping H2 + subtitle reduces cognitive load.
      2. Add `+N more` truncation indicator to tables that .slice(0, 10) when the
         underlying array exceeds 10. Currently: LiteLLMTeamSection users + models,
         CrossSourceTeamSection users — none surface the count of hidden rows.
      3. Verify visual consistency: tone colors, H2/H3 hierarchy, Stack gap values.
         Already mostly consistent (info tone for primary stats, neutral for secondary,
         success/warning/deleted for percentile pills) — small drift checks only.
      4. Re-run canvas-template-contract.test.ts (22 tests). Update if structural
         changes warrant; preserve test intent — every assertion checks a SPECIFIC
         user-facing property that must not regress.

      Conservative bound: ≤200 net new tokens added (favor consolidation, not expansion).
    success_criteria:
      - "Canvas template body delta ≤ +200 tokens net (informational density, not bloat)"
      - "canvas-template-contract.test.ts continues to pass (currently 22/22)"
      - "All other 108 tests still pass — total 130/130"
      - "No regression in tool-contract integration test (1/1 — 16 tools registered)"
    estimated_round: 28
    target_branch: feature/v1.2.0-api-migration
    out_of_scope:
      - "Adding net new sections (the 4 supplementary sections are the surface; expansion is round 29-30 work)"
      - "Refactoring the supplementary section components into separate files (would inflate read cost)"
      - "Changing the data contract (DashboardData / SupplementaryData shapes)"

  - action_id: round_29_identity_flow_consolidation
    priority: P2
    description: |
      Inherited verbatim from round_26/next_action_plan.yaml#round_29:
      Consolidate identity resolution to one resolver shared by all me-/team-/my-tasks
      tools; single source of truth for the X-User-Name header value; single error path
      for "unresolvable". Re-baseline T3 (with-ability vs no-ability) against an expanded
      scenario pack that exercises cross-source / personal-task vocabulary.
    success_criteria:
      - "Single identity resolver function consumed by all me-/team-/my-tasks tools"
      - "T3_baseline_delta re-measured ≥ +0.92 (round 19 carry-forward) and ideally ≥ +0.95 against expanded pack"
      - "diagnose_identity action surface re-evaluated; consider 4→3 if the simplification holds in dogfood"
    estimated_round: 29

  - action_id: round_30_v2_0_0_pre_or_v1_3_0_decision
    priority: P3
    description: |
      Inherited verbatim from round_26/next_action_plan.yaml#round_30:
      IFF rounds 27-29 surface a BREAKING-change axis (e.g. canvas redesign requires API
      shape change in `dashboardData`, or identity consolidation requires removing
      `meHeader` from `get_me` response), tag a `v2.0.0-pre` branch. Otherwise round 30
      is final convergence + a v1.3.0 maintenance bump.

      Round 27 evidence to feed this decision:
      - Canvas trims this round were comment-only; NO API shape change.
      - Tool description trims this round preserved every trigger token; NO contract change.
      - dispatch §AC.7 explicitly states "NO version bump" for round 27 → no breaking-change risk
        introduced in round 27.

      So far the evidence trends toward `v1.3.0` (maintenance bump) for round 30.
    success_criteria:
      - "Decision recorded: v2.0.0 path vs v1.3.0 maintenance path"
      - "If v2.0.0: cut a feature/v2.0.0-pre branch with explicit BREAKING-CHANGES.md draft"
      - "If v1.3.0: bump and ship as a regular maintenance round (mirror round 26 pattern)"
    estimated_round: 30

