rationale: |
  Round 27 is `measurement_only` per spec §15.2 — a code change DID happen (trims),
  but it is intentionally non-functional: 130/130 tests still pass; canvas-template-contract
  still 22/22; tool-contract integration still PASS at 16/16 tools registered. The
  iteration_delta clause is interpreted strictly here: token_delta = +0.084 IS measured
  (1326 / 15793), context_delta = +0.084 by construction (trim IS the C2 reduction),
  and other axes carry forward from round 26.

  The trim allocation matched the dispatch §27.2 priority list:
    1. types.d.ts header collapse (-336 tokens)
    2. usage.canvas.template.tsx ASCII banners + DATA_PLACEHOLDER box (-541 tokens)
    3. empty-data.ts header (-306 tokens)
    4. 7 over-eager MCP tool descriptions (-143 tokens)
    5. SKILL.md (LEFT ALONE per dispatch §27.2 rule 4 — growth was 0% vs v1.1.0)

  Two tools (get_me at 33 tokens, get_agent_hours at 36 tokens) remain over the
  30-token target. The over-budget bytes carry essential trigger vocab (env > IDE >
  CLI > alias > cache resolution chain for `get_me`) and disambiguation (server-fixed
  threshold caveat for `get_agent_hours`). Further trimming would damage either trigger
  precision or the user's ability to debug "0 events" cases — explicitly accepted.

