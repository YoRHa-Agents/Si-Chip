    Per the spec §6 keep rule "task_delta near zero AND ≥1 efficiency axis at gate threshold"
    — this normally would qualify for `half_retire` per the §6 trigger table.

    HOWEVER: the trim cycle is a token-econ optimisation INSIDE an actively shipping
    cycle (Cycle 6 v1.2.0). The intent is to recover token budget so future rounds
    (28-30) can ADD canvas information density / identity-flow polish without breaking
    v1_baseline budgets. Half-retiring now would defeat the cycle. The spec §6 keep
    rule's intent (sunset abilities that no longer meaningfully outperform the base
    model) does not apply: this ability ADDS 8 cross-source tools that no base model
    can reproduce without the ai-bill aggregate API.

    => decision = `keep`. The +0.084 efficiency win is a pure token-budget reclaim
    that funds the next two rounds of capability work.
