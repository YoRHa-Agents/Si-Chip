rationale: |
  Round 28 is `code_change` per spec §15.2 with axis-mixed intent: the canvas
  template grew slightly (+115 tokens / +3 lines) in service of typography
  hierarchy clarity and truncation transparency. The trade-off was explicit:

    Cost: +115 tokens in lazy tier (within +200 budget; -0.008 token_delta)
    Gain: U1 description_readability +1 (qualitative); V3 drift signal stays 0
          with 3 new contract assertions pinning the new invariants

  The canvas-template-contract test count grew 22 → 25 (130 → 133 total).
  Each new test pins a SPECIFIC structural property:
    1. The 'Cross-source & advanced' H2 grouping (with `hasSupplementary` gating)
    2. The MoreRowsFooter helper (≥3 usages)
    3. The H3 demotion of each supplementary section's title

  These mechanical assertions mean future canvas edits cannot accidentally
  regress the round-28 hierarchy without failing at unit-test time. This is
  the V3 drift-signal benefit that funds the +115 token cost.

