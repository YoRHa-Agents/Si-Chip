      delta: '+1_qualitative'
      rationale: |
        Pre-round-28: 4 supplementary sections each had their own `<Divider />` + `<H2>` +
        `<Text tone="secondary">subtitle</Text>` block. With all 4 active, the canvas had
        8 H2-level sections of vertical scroll, no visual grouping signaling that the
        bottom 4 are "optional / cross-source / agent-populated".

        Post-round-28: 1 outer `<Divider />` + 1 `<H2>Cross-source &amp; advanced</H2>`
        group header + 1 subtitle explains the optional nature ONCE, then 4 H3 subsections
        nest under it. The 4 conditional sections now read as a coherent "advanced"
