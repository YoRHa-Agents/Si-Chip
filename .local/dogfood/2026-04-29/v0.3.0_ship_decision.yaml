# v0.3.0 is an additive bump from v0.2.0 — §3 / §4 / §5 / §6 / §7 / §8 / §11 / §13
# are byte-identical; spec_v0.3.0 promotes from v0.3.0-rc1 with body byte-identical.
# Three additions: §14 core_goal Normative + §15 round_kind Normative + §16
# multi-ability layout Informative; §17 adds 2 incremental hard rules to AGENTS.md
# §13 (8 → 10). v0.3.0 ships at the SAME gate as v0.2.0 (relaxed = v1_baseline);
# v2_tightened still blocked by the carry-forward T2_pass_k structural blocker
# (deterministic SHA-256 PROXY pass_k_4 = pass_rate^4 = 0.5478 vs >= 0.55, -0.0022)
# which requires a real-LLM runner deferred to v0.4.0 (carry-forward from
# v0.2.0 ship report's "Roadmap to v0.3.0" — that section is now "Roadmap
# to v0.4.0" because v0.3.0 was scoped to core_goal + round_kind +
# multi-ability layout, not the real-LLM runner).

