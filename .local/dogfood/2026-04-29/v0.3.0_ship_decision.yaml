ship_gate_achieved: "relaxed"   # = v1_baseline; same gate as v0.2.0 ship
ship_gate_v2_tightened_deferred_to: "v0.4.0+"
ship_gate_deferral_reason: |
  T2_pass_k v1_baseline proxy formula (pass_rate^4) yields 0.5477708333333333
  which fails v2_tightened >= 0.55 by -0.0022; SAME blocker as v0.2.0 ship.
  Real k=4 sampling requires a real-LLM runner
  (evals/si-chip/runners/real_llm_runner.py), which is deferred to v0.4.0
  per the v0.2.0 ship report's "Roadmap to v0.3.0" carry-forward (that
  section is now "Roadmap to v0.4.0" because v0.3.0 was scoped to
  core_goal + round_kind + multi-ability layout, not the real-LLM runner).
  Round 14 (code_change) cannot mod the baselines without becoming a
  measurement-fill round per §15.1 mixed-kind prohibition; Round 15
  (measurement_only) by definition cannot mod source. So the v2 unblock
  remains structurally outside this dogfood cycle's scope.

