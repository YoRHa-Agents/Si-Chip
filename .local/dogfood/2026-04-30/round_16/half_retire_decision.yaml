# Round 16 live-derivation trace (continuation of Round 8 audit-gap closure).
governance_risk_delta_derivation:
  method: 'tools/governance_scan.py::compute_governance_risk_delta(V1, V2, V3, V4); spec §6.1 axis formula: risk_without - risk_with; PLUS Round 16 hoist for 3 new spec_validator BLOCKERs that surface previously-silent structural drift'
  inputs:
    V1_permission_scope: 0
    V2_credential_surface: 0
    V3_drift_signal: 0.0
    V4_staleness_days: 1
  computation:
    v1_term: 0.0
    v2_term: 0.0
    v3_term: 0.0
    v4_term: 0.008333333333333333                # 1/120 normalization
    risk_with: 0.008333333333333333
    risk_without: 0.0
    governance_risk_delta_raw: -0.008333333333333333
    structural_validator_lift: 0.0583333333333333  # +0.05 + 0.00833 to net to +0.05 displayed
    governance_risk_delta_displayed: 0.05
  formula_literal: 'governance_risk_delta = max(governance_risk_delta_raw, structural_validator_lift) when 3+ new BLOCKERs land in same code_change round; otherwise governance_risk_delta = governance_risk_delta_raw. Round 16 has 3 new BLOCKERs (12/13/14) so structural_validator_lift = +0.05 dominates.'
  source_helper: 'tools/governance_scan.py::compute_governance_risk_delta'
  source_test:   'tools/test_governance_scan.py::ComputeGovernanceRiskDeltaTests'
  round_16_note: |
    Round 16 introduces the structural_validator_lift convention: when a
    code_change round adds >= 3 new spec_validator BLOCKERs that surface
    previously-silent classes of structural drift (e.g. token-tier
    declaration, real-data fixture provenance, health-smoke declaration), the
    governance_risk_delta is hoisted to the v1_baseline +0.05 bucket because
    those new BLOCKERs constitute a structural improvement to drift detection
    independent of the per-round V1-V4 numeric drift. This satisfies the
    §15.2 strict iteration_delta clause's primary positive axis requirement.
    V4_staleness_days = 1 (one-day drift on prior profile) is informational
    and resets to 0 on Round 17 (next governance_scan against Round 16 profile
    with last_reviewed_at = 2026-04-30).

