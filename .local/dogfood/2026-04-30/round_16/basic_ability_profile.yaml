basic_ability:
  id: si-chip
  intent: 'Persistent BasicAbility optimization factory: capture, profile, evaluate, diagnose, improve, router-test, half-retire-review, iterate, package/register the Si-Chip skill against itself.'

  # ── §14.1 core_goal block (REQUIRED v0.3.0+) ─────────────────────────
  core_goal:
    statement: |
      Given a BasicAbility input, Si-Chip MUST emit the 6 evidence files (spec §8.2 - basic_ability_profile / metrics_report / router_floor_report / half_retire_decision / next_action_plan / iteration_delta_report) under .local/dogfood/<DATE>/[abilities/<id>/]round_<N>/ and produce a deterministic 14-BLOCKER spec_validator PASS on BOTH the frozen v0.2.0 spec AND the newly shipped v0.4.0-rc1 spec.
    test_pack_path: .local/dogfood/2026-04-29/abilities/si-chip/core_goal_test_pack.yaml
    minimum_pass_rate: 1.0
    test_pack_version: '1.0.0'
    last_passed_round: round_16    # BUMPED from Round 15's 'round_15' (Round 16 confirmed C0 = 1.0 = 5/5 cases pass; per raw/eval_skill_output.yaml#core_goal).

  # ── §2.1 current_surface (+ §21.2 v0.4.0 dependencies block) ─────────
  current_surface:
    type: mixed
    path: .agents/skills/si-chip/
    shape_hint: markdown_first
    dependencies:                  # NEW v0.4.0 §21.2
      live_backend: false          # Si-Chip self-dogfood is fully local: all evidence in .local/dogfood/, no HTTP/queue/DB dependency. spec_validator BLOCKER 14 HEALTH_SMOKE_DECLARED_WHEN_LIVE_BACKEND therefore SKIP-PASSES this profile (per §21.2.2 "skip when live_backend false or absent").

  # ── §2.1 packaging (+ §21.1 v0.4.0 health_smoke_check) ───────────────
  packaging:
    install_targets:
      cursor: true
      claude_code: true
      codex: true                 # bridge-only per §7.2 priority 3 / §11.2 deferred - install_target=true reflects the AGENTS.md + .codex/ bridge surface (NOT native SKILL.md runtime).
    source_of_truth: .agents/skills/si-chip/
    generated_targets:
      - .cursor/skills/si-chip/
      - .claude/skills/si-chip/
      - 'AGENTS.md (via .rules/si-chip-spec.mdc compiler)'
    health_smoke_check: []         # NEW v0.4.0 §21.1; EMPTY by design - Si-Chip has no live backend (current_surface.dependencies.live_backend = false). spec_validator BLOCKER 14 SKIPS this profile (skip-by-absence-of-live-backend per §21.2.2).

  # ── §2.1 lifecycle (+ §20.2 v0.4.0 promotion_history) ────────────────
  lifecycle:
    stage: routed                  # UNCHANGED from Round 15 (PROMOTED Round 14 from Round 13's `evaluated`); Round 16 is a code_change round but does NOT cross any §20.1 stage_transition_table row, so stage remains routed.
    last_reviewed_at: '2026-04-30' # BUMPED from Round 15's '2026-04-29' (Round 16 is a different calendar day; live spec/templates/tools/SKILL.md edits performed today).
    next_review_at: '2026-05-30'   # last_reviewed_at + 30 days per §6 cadence.
    promotion_history: []          # NEW v0.4.0 §20.2; EMPTY for Si-Chip self - per §20.5 backward-compat clause, profiles authored before Round 16 do NOT retroactively populate promotion_history; Si-Chip's stage transitions across Rounds 1-15 (exploratory -> evaluated by Round 1; evaluated -> routed by Round 14) pre-date the §20.2 schema and remain unrecorded by design. Future stage transitions (Round 16+) MUST append entries.

  eval_state:
    has_eval_set: true
    has_no_ability_baseline: true
    has_self_eval: true
    has_router_test: true
    has_iteration_delta: true

  # R6 7-dim 37-sub-metric block. Round 16 has FRESH live measurements for the
