  metadata_tokens row is the binding constraint at v3_strict. Additionally, G2/G3/G4
  generalizability and L5/L6/L7 latency-path remain partial (96-cell intermediate full
  router-test deferred to v0.4.x). v3_strict promotion targeted for v0.4.x bump after
  metadata_tokens shrink + G2-G4 + L5-L7 fills.

