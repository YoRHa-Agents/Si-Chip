    structural_blocker_unblocked: |
      The deterministic SHA-256 simulator's pass_k_4 = pass_rate^4 PROXY (lower bound)
      had blocked v2_tightened T2 row since Round 1 (Round 11 reconciled to 0.5478
      vs >= 0.55 by -0.0022). Real k=4 sampling against claude-haiku-4-5 +
      claude-sonnet-4-6 yields best-cell pass_at_k = 1.0 (4 of 8 cells), mean across
      cells = 0.9719. T2_pass_k UNBLOCKED to v3_strict ceiling.
  six_new_normative_sections:
    section_18_token_tier: |
      Top-level `token_tier {C7_eager_per_session, C8_oncall_per_trigger,
      C9_lazy_avg_per_load}` block; EAGER-weighted iteration_delta formula
      `weighted_token_delta = 10×eager + 1×oncall + 0.1×lazy`; lazy_manifest packaging
      gate; prose_class taxonomy (Informative); R3 split into R3_eager_only / R3_post_trigger;
      tier_transitions block. spec_validator BLOCKER 12 TOKEN_TIER_DECLARED_WHEN_REPORTED.
    section_19_real_data_verification: |
      Normative sub-step of §8.1 step 2 evaluate (main 8-step list count unchanged);
      3-layer pattern (msw fixture provenance + user-install + post-recovery live
      verification); templates/feedback_real_data_samples.template.yaml;
      spec_validator BLOCKER 13 REAL_DATA_FIXTURE_PROVENANCE.
    section_20_lifecycle_state_machine: |
      stage_transition_table per §2.2 stage enum DAG (reverse transitions forbidden);
      BasicAbility.lifecycle.promotion_history append-only; metrics_report.promotion_state
      first-class top-level block; ship_decision.yaml is 7th evidence file when
      round_kind == 'ship_prep'.
    section_21_health_smoke_check: |
      packaging.health_smoke_check 4-axis taxonomy {read, write, auth, dependency};
      OPTIONAL at schema level, REQUIRED when current_surface.dependencies.live_backend: true;
      OTel semconv extension gen_ai.tool.name=si-chip.health_smoke; spec_validator
      BLOCKER 14 HEALTH_SMOKE_DECLARED_WHEN_LIVE_BACKEND.
    section_22_eval_pack_curation: |
      40-prompt minimum for v2_tightened promotion (curated near-miss bucket);
      G1 _provenance ∈ {real_llm_sweep, deterministic_simulation, mixed} first-class
      REQUIRED; deterministic seeding rule hash(round_id + ability_id); real-LLM cache
      directory at .local/dogfood/<DATE>/<round_id>/raw/real_llm_runner_cache/.
    section_23_method_tagged_metrics: |
      <metric>_method companion fields (token: {tiktoken, char_heuristic, llm_actual};
      quality/routing: {real_llm, deterministic_simulator, mixed}; G1: {real_llm_sweep,
      deterministic_simulation, mixed}); _ci_low/_ci_high 95% CI bands; U1_language_breakdown;
      U4_state ∈ {warm, cold, semicold}; spec_validator R6_KEYS BLOCKER ignores companion suffixes.
  six_one_value_vector_axes_break:
    description: |
      §6.1 value_vector axes count moves from 7 (v0.3.0) to 8 (v0.4.0). The new
      `eager_token_delta` axis enables §6.2 half-retire decisions to differentiate
      EAGER vs ON-CALL token wins (per chip-usage-helper Cycle 2 -55% EAGER win
      evidence). spec_validator's VALUE_VECTOR_AXES BLOCKER expectation is bumped
      accordingly (version-aware: 7 ≤ v0.3.0; 8 @ v0.4.0+).
    first_byte_identicality_break_since: "v0.1.0 → v0.2.0 prose-count alignment"
    user_decision_basis: "Q4 user-confirmed (per .local/research/v0_4_0_iteration_plan.md)"
  agent_behavior_contract_addons:
    rule_11: "MUST declare token_tier {C7_eager_per_session, C8_oncall_per_trigger, C9_lazy_avg_per_load} in metrics_report.yaml when ANY tier sub-axis is reported (per spec §17.4 / §18.1; spec_validator BLOCKER 12 TOKEN_TIER_DECLARED_WHEN_REPORTED)."
    rule_12: "MUST cite real-data sample provenance in test fixture filenames or in-file comments (// real-data sample provenance: <captured_at> / <observer>) when the ability has real_data_samples declared in feedback_real_data_samples.yaml (per spec §17.5 / §19.3; spec_validator BLOCKER 13 REAL_DATA_FIXTURE_PROVENANCE)."
