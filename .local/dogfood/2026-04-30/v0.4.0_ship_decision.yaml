# Author: Round 19 dogfood — L3 Task Agent (Stage 8 ship-prep)
# Companion to: .local/dogfood/2026-04-30/v0.4.0_ship_report.md
# Shape after .local/dogfood/2026-04-29/v0.3.0_ship_decision.yaml.
#
# v0.4.0 is an additive-with-one-byte-identicality-break bump from v0.3.0:
# §3 / §4-main-table / §5 / §7 / §8-main-list / §11 / §13 / §14 / §15 / §16 /
# §17.1-§17.2 are byte-identical to v0.3.0; §6.1 value_vector axes 7→8
# (adds eager_token_delta) is the FIRST byte-identicality break since
# v0.1.0 → v0.2.0 prose-count alignment, per Q4 user decision. Six
# new Normative sections: §18 token-tier + §19 real-data-verification +
# §20 lifecycle state machine + §21 health-smoke + §22 eval-pack-curation +
# §23 method-tagged-metrics. §17 adds 3 incremental hard rules to
# AGENTS.md §13 (10 → 13). spec_v0.4.0.md promotes from spec_v0.4.0-rc1.md
# with body byte-identical except metadata.
#
# v0.4.0 ships at the v2_tightened (= standard) gate — the FIRST Si-Chip
# release at standard gate (vs v0.2.0 / v0.3.0 at relaxed = v1_baseline).
# The structural blocker for v2_tightened (T2_pass_k = 0.5478 deterministic
# SHA-256 PROXY since Round 1) was unblocked at Round 18 via real_llm_runner.py
# first dogfood-side invocation against claude-haiku-4-5 + claude-sonnet-4-6
# via Veil litellm-local egress at 127.0.0.1:8086 (PROCEED_MAJOR ratification
# of Stage 1 r12.5 spike). Round 19 second consecutive v2_tightened pass
# via cache replay byte-equivalence to Round 18 (consecutive_v2_passes=2;
# §4.2 promotion rule SATISFIED).

