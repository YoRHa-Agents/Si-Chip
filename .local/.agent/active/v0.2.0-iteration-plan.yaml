multi_round_shared:
  description: |
    Files touched at every round (or most rounds), tracked here so per-round
    scope_writable_files can stay disjoint on the substantive deltas. The L3
    task agents in Stage B own these files PER-ROUND (just for their bump),
    not exclusively across rounds.
  files:
    - path: CHANGELOG.md
      reason: "Each round adds an entry under [Unreleased] -> ### Added/Changed/Fixed; promotion to a numbered section happens at v0.2.0 ship time."
    - path: .agents/skills/si-chip/SKILL.md
      reason: "frontmatter `version` bumps every round (0.1.1 -> 0.1.2 -> ... -> 0.1.11). Body edits are forbidden unless the round's theme explicitly involves SKILL.md (only Round 11 may also edit body)."
    - path: .cursor/skills/si-chip/SKILL.md
      reason: "Mirror sync from .agents/skills/si-chip/SKILL.md per spec §7.2; drift = CI failure."
    - path: .claude/skills/si-chip/SKILL.md
      reason: "Mirror sync from .agents/skills/si-chip/SKILL.md per spec §7.2; drift = CI failure."
    - path: docs/skills/si-chip-<version>.tar.gz
      reason: "Deterministic release tarball regenerated per round (or skipped if not packaging-ready). Required at Round 12 for v0.2.0 ship."
    - path: install.sh
      reason: "SI_CHIP_VERSION_DEFAULT bumps every round. (Round 6 also touches install.sh body for U3/U4 instrumentation; other rounds touch only the version constant.)"
    - path: docs/install.sh
      reason: "Mirror of install.sh per CHANGELOG v0.1.1 entry; same SI_CHIP_VERSION_DEFAULT bump."
    - path: docs/_install_body.md
      reason: "Quick-install one-liner references the version; bump per round."

aggregation:
  ship_gate_for_v0.2.0: v2_tightened  # spec §4.1 — promotion target after 10 rounds
  spec_bump_required: true             # Round 11 sets spec_normative_changes: true; v0.1.0 -> v0.2.0-rc1 -> v0.2.0
