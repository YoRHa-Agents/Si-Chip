  - round_id: round_12
    project_version: 0.1.11
    theme: "implement §6.4 Reactivation Trigger detector + verify v2_tightened readiness for v0.2.0 ship"
    primary_metrics_targeted:
      - T1_pass_rate
      - C1_metadata_tokens
      - C4_per_invocation_footprint
      - L2_wall_clock_p95
      - R3_trigger_F1
    rationale: |
      Spec §6.4 enumerates 6 reactivation triggers (≥5 required) but no code
      currently checks them programmatically. Si-Chip is currently in stage
      'evaluated' with decision 'keep', so no half_retired ability exists to
      reactivate — the detector is for future when an ability has been
      half_retired and needs to know when to wake up. tools/reactivation_detector.py
      reads basic_ability_profile.yaml, half_retire_decision.yaml, and the
      latest metrics_report.yaml; emits a JSON list of triggered conditions.
      Round 12 also runs the v2_tightened threshold check across Round 11 +
      Round 12 metrics_report.yaml to verify two-consecutive-v2 readiness:
