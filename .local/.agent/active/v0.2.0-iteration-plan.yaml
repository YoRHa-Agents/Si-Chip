# Si-Chip v0.2.0 Iteration Plan — Stage A synthesis (L1 Stage Agent)
# Target: drive 10 dogfood rounds (round_3 -> round_12) from project v0.1.1 baseline
# (SHIP_ELIGIBLE at relaxed/v1_baseline) toward project v0.2.0 (target ship gate
# = standard / v2_tightened, contingent on 2 consecutive v2 passes per spec §4.2).
#
# Per-round target_gate stays at relaxed (v1_baseline). Promotion to v2_tightened is
# attempted only at the v0.2.0 ship gate, after Round 11 (spec reconciliation -> v0.2.0-rc1)
# and Round 12 (reactivation detector + v2 readiness verification) have landed.
#
# Conforms to the Stage A schema in the L1 task spec. Strict shape — do not extend.
# Spec citations: AGENTS.md §3.1 (R6 28 sub-metrics), §4.1 (gate thresholds),
# §5 (router paradigm), §6 (half-retire + §6.4 reactivation), §8 (8-step dogfood +
# 6 evidence files), §11 (forever-out scope guard).

spec_version: v0.1.0
project_version_current: 0.1.1
project_version_target: 0.2.0
target_gate_per_round: relaxed  # v1_baseline; promotion to v2_tightened deferred to v0.2.0 ship gate

iterations:
  - round_id: round_3
    project_version: 0.1.2
    theme: "fill R6_routing_latency_p95 + R7_routing_token_overhead (D6 routing-cost completion)"
    primary_metrics_targeted:
      - R6_routing_latency_p95
      - R7_routing_token_overhead
    rationale: |
      Round 2 next_action_plan a2 + a3 explicitly pre-specified Round 3 to fill the
      two D6 routing-cost null cells (R6_routing_latency_p95 still null;
      R7_routing_token_overhead still null). Both are §4.1 v1_baseline hard
      threshold rows (<= 2000 ms; <= 0.20). Round 2's iteration_delta_report
      flagged them as "pass: inapplicable" twice in a row — fixing them unblocks
      v2_tightened promotion (which strictly requires both rows to be measured).
      router_floor_report.yaml already emits per-cell latency_p95_ms in the
      simulated 8-cell sweep; aggregator just needs to hoist the cheapest passing
      cell's latency_p95_ms into metrics_report.yaml. R7 = (router-stage tokens /
      body-invocation tokens); count_tokens.py + router_floor_report can produce
      the ratio without new instrumentation.
    scope_writable_files:
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - evals/si-chip/runners/with_ability_runner.py
      - .local/dogfood/2026-04-28/round_3/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_3/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_3/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_3/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_3/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_3/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_3/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - templates/router_test_matrix.template.yaml
      - .local/dogfood/2026-04-28/round_2/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_2/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_2/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_2/iteration_delta_report.yaml
    expected_iteration_delta_axes:
      - routing_cost
    acceptance_criteria:
      - "metrics_report.yaml R6_routing_latency_p95 non-null AND <= 2000 ms (v1_baseline ceiling)"
      - "metrics_report.yaml R7_routing_token_overhead non-null AND <= 0.20 (v1_baseline ceiling)"
      - "iteration_delta_report.yaml routing_cost axis delta >= +0.05 (v1_baseline iteration_delta bucket) OR clearly attributed to the 'measurement-fill' axis bonus"
      - "all 6 evidence files present at .local/dogfood/2026-04-28/round_3/ (spec §8.2)"
      - "tools/spec_validator.py --json default-mode 8/8 PASS unchanged"
      - "T1_pass_rate >= 0.85 (no regression vs Round 2's 0.85)"
    spec_normative_changes: false
    risk_flags:
      - "router_floor cells are simulated (deterministic); the R6 number is a sweep latency, not yet a real-LLM latency. Documented Round 4+ upgrade path."

  - round_id: round_4
    project_version: 0.1.3
    theme: "fill L1_wall_clock_p50 + L3_step_count + L4_redundant_call_ratio (D3 latency-path completion)"
    primary_metrics_targeted:
      - L1_wall_clock_p50
      - L3_step_count
      - L4_redundant_call_ratio
    rationale: |
      Round 2 next_action_plan a1 carried Round 1's deferred latency action forward
      to Round 3+. Round 4 picks it up: split percentile_p50 alongside p95 in the
      runner's percentile helper; emit step_count and redundant_call_ratio from
      the run logs (both already implicit in result.json's call sequence). This
      moves D3 latency-path coverage from 1/7 sub-metrics (only L2 measured) to
      4/7. None of L1/L3/L4 has a §4.1 hard threshold row at v1_baseline — they
      are correctness/path metrics — so the gate impact is filling 28-key null
      placeholders, not changing pass/fail.
    scope_writable_files:
      - evals/si-chip/runners/with_ability_runner.py
      - evals/si-chip/runners/no_ability_runner.py
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - .local/dogfood/2026-04-28/round_4/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_4/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_4/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_4/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_4/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_4/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_4/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - .local/dogfood/2026-04-28/round_3/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_3/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_3/next_action_plan.yaml
      - templates/basic_ability_profile.schema.yaml
    expected_iteration_delta_axes:
      - latency_path
    acceptance_criteria:
      - "metrics_report.yaml L1_wall_clock_p50 non-null AND <= L2_wall_clock_p95 (sanity invariant)"
      - "metrics_report.yaml L3_step_count non-null (integer >= 1)"
      - "metrics_report.yaml L4_redundant_call_ratio non-null AND in [0.0, 1.0]"
      - "L2_wall_clock_p95 has not regressed (still <= 1.469 s within ±1%)"
      - "iteration_delta_report.yaml latency_path axis flagged with delta_iteration_flavour >= +0.05 (measurement-fill or actual reduction)"
      - "all 6 evidence files present (spec §8.2)"
      - "T1_pass_rate >= 0.85 (no regression)"
    spec_normative_changes: false
    risk_flags:
      - "L4_redundant_call_ratio derivation depends on call-graph parsing in result.json; the 6 simulated cases may yield a degenerate 0.0 — accept that and document it."

  - round_id: round_5
    project_version: 0.1.4
    theme: "fill U1_description_readability + U2_first_time_success_rate (D5 usage-cost open)"
    primary_metrics_targeted:
      - U1_description_readability
      - U2_first_time_success_rate
    rationale: |
      Round 2 next_action_plan a4 explicitly carried U1+U2 forward. D5 usage_cost
      is currently fully null (4/4 sub-metrics) — the highest-leverage dimension
      to begin filling. U1 = Flesch-Kincaid grade level on the SKILL.md
      `description` frontmatter field (computed via a small helper inside
      count_tokens.py or a sibling script). U2 = first-trigger success rate
      derived from existing prompt_outcomes (no new runner needed). Nines analyze
      flagged D14 index_recall=0.2 and D15 structure_recognition=0.75 — both are
      upstream signals that Si-Chip's description quality is the limiting factor,
      reinforcing the U1 priority.
    scope_writable_files:
      - .agents/skills/si-chip/scripts/count_tokens.py
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - .local/dogfood/2026-04-28/round_5/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_5/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_5/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_5/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_5/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_5/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_5/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - .local/dogfood/2026-04-28/round_4/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_4/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_3/raw/nines_self_eval_out/self_eval_report.txt
    expected_iteration_delta_axes:
      - usage_cost
    acceptance_criteria:
      - "metrics_report.yaml U1_description_readability non-null AND in [0.0, 24.0] (FK grade range)"
      - "metrics_report.yaml U2_first_time_success_rate non-null AND in [0.0, 1.0]"
      - "U1 is computed via the new helper, with reproducibility recorded in raw/u1_fk_derivation.json"
      - "U2 derivation traces to evals/si-chip/baselines/with_si_chip*/result.json prompt_outcomes (no new runner)"
      - "iteration_delta_report.yaml usage_cost axis is now non-zero (was 0.0 in Round 2-4)"
      - "all 6 evidence files present (spec §8.2)"
      - "T1_pass_rate >= 0.85 (no regression)"
    spec_normative_changes: false
    risk_flags:
      - "FK-grade is an English-prose metric; SKILL.md `description` is short and bilingual-naming-heavy. The number may be unflattering — that's OK, surfacing it is the value."

  - round_id: round_6
    project_version: 0.1.5
    theme: "fill U3_setup_steps_count + U4_time_to_first_success (D5 usage-cost completion)"
    primary_metrics_targeted:
      - U3_setup_steps_count
      - U4_time_to_first_success
    rationale: |
      Round 5 closed half of D5 (U1+U2). Round 6 closes the remaining half by
      instrumenting install.sh: U3 = count of explicit user steps in the
      one-line installer flow (target = 1 per CHANGELOG v0.1.1 'one-line
      installer' claim; we want the metric to validate the claim); U4 = wall
      time from `curl ... | bash` to `count_tokens.py --file SKILL.md`
      successfully exiting 0. A small `tools/install_telemetry.py` helper logs
      timestamps to .local/dogfood/<date>/round_6/raw/ and the aggregator
      ingests them. After Round 6, D5 = 4/4 sub-metrics measured.
    scope_writable_files:
      - install.sh
      - tools/install_telemetry.py
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - .local/dogfood/2026-04-28/round_6/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_6/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_6/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_6/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_6/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_6/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_6/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - INSTALL.md
      - docs/_install_body.md
      - .local/dogfood/2026-04-28/round_5/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_5/iteration_delta_report.yaml
    expected_iteration_delta_axes:
      - usage_cost
    acceptance_criteria:
      - "metrics_report.yaml U3_setup_steps_count non-null AND <= 2 (matches CHANGELOG v0.1.1 claim)"
      - "metrics_report.yaml U4_time_to_first_success non-null AND <= 60 s (sanity ceiling for one-line install)"
      - "tools/install_telemetry.py is testable (unit test asserts duration parsing) per workspace 'Mandatory Verification' rule"
      - "install.sh modifications do NOT regress its existing flags (--target, --scope, --version, --dry-run, etc.); regression tested via --dry-run"
      - "iteration_delta_report.yaml usage_cost axis delta >= +0.05 OR D5 coverage moves from 2/4 -> 4/4 (full-coverage flavour)"
      - "all 6 evidence files present (spec §8.2)"
    spec_normative_changes: false
    risk_flags:
      - "U4 timing depends on network latency to docs/skills/si-chip-*.tar.gz; record p50 + p95 separately if variance is high."

  - round_id: round_7
    project_version: 0.1.6
    theme: "fill C5_context_rot_risk + C6_scope_overlap_score (D2 context-economy completion)"
    primary_metrics_targeted:
      - C5_context_rot_risk
      - C6_scope_overlap_score
    rationale: |
      D2 context_economy currently has 3/6 sub-metrics filled (C1, C2, C4). C3
      resolved_tokens stays null because Si-Chip's references are loaded on
      demand only (count is N/A this round; explicit null is the correct
      value). C5 context_rot_risk = approximation based on (body_tokens /
      typical-context-window) ratio + reference-fanout depth (a deterministic
      proxy referencing 2026 frontier-model context-rot studies cited in
      references/metrics-r6-summary.md). C6 scope_overlap_score = Jaccard
      similarity between Si-Chip SKILL.md description tokens and the next 5
      neighboring skills in the workspace .agents/skills/ directory — measures
      the §3 'description competition' surface area that R8 will widen in
      Round 9.
    scope_writable_files:
      - .agents/skills/si-chip/scripts/count_tokens.py
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - .local/dogfood/2026-04-28/round_7/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_7/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_7/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_7/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_7/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_7/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_7/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - .agents/skills/si-chip/references/
      - .local/dogfood/2026-04-28/round_6/metrics_report.yaml
    expected_iteration_delta_axes:
      - context_economy
    acceptance_criteria:
      - "metrics_report.yaml C5_context_rot_risk non-null AND in [0.0, 1.0]"
      - "metrics_report.yaml C6_scope_overlap_score non-null AND in [0.0, 1.0]"
      - "C5 derivation traces to a deterministic formula recorded in raw/c5_derivation.json"
      - "C6 derivation traces to raw/c6_overlap_pairs.json showing the neighbor skill ids and per-pair Jaccard"
      - "iteration_delta_report.yaml context_economy axis stays positive (no body regression vs Round 2's 2020 tokens)"
      - "all 6 evidence files present (spec §8.2)"
      - "T1_pass_rate >= 0.85 (no regression)"
    spec_normative_changes: false
    risk_flags:
      - "C5 'context-rot risk' is currently a heuristic; do not present it as ground-truth — record it as a v1_baseline-acceptable proxy."

  - round_id: round_8
    project_version: 0.1.7
    theme: "fill V1+V2+V3+V4 governance/risk dimension (D7 full coverage)"
    primary_metrics_targeted:
      - V1_permission_scope
      - V2_credential_surface
      - V3_drift_signal
      - V4_staleness_days
    rationale: |
      D7 governance_risk is currently 0/4 sub-metrics. None has a §4.1 hard
      threshold row, but §6 half_retire decision rules cite governance_risk_delta
      as a tie-breaker (negative governance_risk_delta forces disable_auto_trigger
      regardless of other axes). Without V1-V4 measured, the half_retire_decision.yaml
      governance_risk_delta is currently hard-coded to 0.0 — a small but real
      audit gap. A new helper tools/governance_scan.py inventories: V1 = list of
      filesystem paths the skill writes outside .local/dogfood/ (currently 0 = clean);
      V2 = list of credential/secret patterns referenced in any skill artifact
      (currently 0 = clean); V3 = drift signal = 1 - cross_tree_drift_zero
      ratio across the 3 mirrors (currently 0.0 = clean per v0.1.0 ship report);
      V4 = days since last_reviewed_at on the basic_ability_profile.
    scope_writable_files:
      - tools/governance_scan.py
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - .local/dogfood/2026-04-28/round_8/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_8/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_8/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_8/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_8/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_8/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_8/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - .cursor/skills/si-chip/SKILL.md
      - .claude/skills/si-chip/SKILL.md
      - .local/dogfood/2026-04-28/v0.1.0_ship_decision.yaml
      - .local/dogfood/2026-04-28/round_7/metrics_report.yaml
    expected_iteration_delta_axes:
      - governance_risk
    acceptance_criteria:
      - "metrics_report.yaml V1_permission_scope non-null (integer count or 0)"
      - "metrics_report.yaml V2_credential_surface non-null (integer count or 0)"
      - "metrics_report.yaml V3_drift_signal non-null AND in [0.0, 1.0]"
      - "metrics_report.yaml V4_staleness_days non-null (integer >= 0)"
      - "tools/governance_scan.py has unit tests (per workspace 'Mandatory Verification' rule)"
      - "half_retire_decision.yaml governance_risk_delta is no longer hard-coded 0.0 — uses live V1-V4 input"
      - "iteration_delta_report.yaml governance_risk axis can now be positive_axis: true with delta >= 0.0 (still neutral; not a regression)"
      - "all 6 evidence files present (spec §8.2)"
    spec_normative_changes: false
    risk_flags:
      - "V2 credential_surface scan must NOT log secret values themselves; only counts and pattern names. Workspace 'No Silent Failures' rule applies if secrets are detected."

  - round_id: round_9
    project_version: 0.1.8
    theme: "fill R8_description_competition_index + widen router-test from 8-cell MVP to 16-cell intermediate (D6 routing-cost final)"
    primary_metrics_targeted:
      - R8_description_competition_index
    rationale: |
      D6 routing_cost reaches 7/8 sub-metrics after Round 3 + 5; the only
      remaining null is R8_description_competition_index. R8 = how many other
      skills in the workspace .agents/skills/ directory have descriptions
      semantically similar to Si-Chip's (TF-IDF cosine or token-Jaccard against
      neighbor skill descriptions). Intermediate router-test widening: keep the
      8-cell MVP profile, ADDITIVELY introduce a 16-cell intermediate (3 model
      x 2 thinking_depth x 2 scenario, or 2 x 2 x 4 scenario) profile to the
      router_test_matrix template — non-Normative additive change because it
      does NOT modify the existing mvp:8 / full:96 frozen profiles. Spec §5
      Router Paradigm prohibits training a router model; widening the test
      harness with more cells is explicitly allowed (it's the §5.1 'metadata
      retrieval / heuristic kNN baseline' surface). Full 96-cell stays gated
      to v2_tightened+ as before.
    scope_writable_files:
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - templates/router_test_matrix.template.yaml
      - evals/si-chip/runners/with_ability_runner.py
      - tools/spec_validator.py
      - .local/dogfood/2026-04-28/round_9/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_9/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_9/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_9/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_9/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_9/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_9/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - .agents/skills/si-chip/references/router-test-r8-summary.md
    expected_iteration_delta_axes:
      - routing_cost
    acceptance_criteria:
      - "metrics_report.yaml R8_description_competition_index non-null AND in [0.0, 1.0]"
      - "templates/router_test_matrix.template.yaml introduces an 'intermediate' profile alongside mvp:8 and full:96; cell_counts updated; spec_validator extended to assert intermediate.cells == 16"
      - "intermediate profile is gate-bound to relaxed (v1_baseline) — same gate as mvp; not a §5.4 binding change"
      - "router_floor_report.yaml emits BOTH mvp 8-cell and intermediate 16-cell sweeps; router_floor selection uses the intersection (cheapest cell passing on BOTH profiles)"
      - "tools/spec_validator.py default-mode 8/8 PASS still holds"
      - "iteration_delta_report.yaml routing_cost axis is positive_axis: true (R8 fill OR floor improvement)"
      - "all 6 evidence files present (spec §8.2)"
      - "spec §11 invariants unchanged (no router model training; intermediate is metadata-retrieval expansion only)"
    spec_normative_changes: false
    risk_flags:
      - "Adding an intermediate profile changes templates/router_test_matrix.template.yaml — a §9 Factory Template Contract file. Bumping its $schema_version to 0.1.1 is required and validator must accept both 0.1.0 and 0.1.1 schema."

  - round_id: round_10
    project_version: 0.1.9
    theme: "fill G1_cross_model_pass_matrix (D4 generalizability — first sub-metric)"
    primary_metrics_targeted:
      - G1_cross_model_pass_matrix
    rationale: |
      D4 generalizability is currently 0/4. Even a 2-model proxy matrix counts
      toward G1 coverage. The 8-cell MVP router-test already runs 2 models
      (composer_2, sonnet_shallow) x 2 depths x 2 packs — collapse the depth
      dimension to produce a 2-model-by-2-pack pass_rate matrix and emit it
      as G1. Nines self-eval flagged D01 scoring_accuracy = 0 and D02
      eval_coverage = 0 because the workspace has no
      `data/golden_test_set/` directory; create a small evals/si-chip/golden_set/
      with 12-20 prompts per pack (the existing trigger_basic + near_miss
      packs are the obvious source) so future rounds (v0.2.x+) can opt-in
      to a real golden set without renaming. G2/G3/G4 stay null (cross-domain,
      OOD, version-stability are out of scope for v0.1.x and Round 11
      reconciles whether they need to ship in v0.2.0 or v0.3.0).
    scope_writable_files:
      - .agents/skills/si-chip/scripts/aggregate_eval.py
      - evals/si-chip/golden_set/
      - .local/dogfood/2026-04-28/round_10/basic_ability_profile.yaml
      - .local/dogfood/2026-04-28/round_10/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_10/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_10/half_retire_decision.yaml
      - .local/dogfood/2026-04-28/round_10/next_action_plan.yaml
      - .local/dogfood/2026-04-28/round_10/iteration_delta_report.yaml
      - .local/dogfood/2026-04-28/round_10/raw/
    scope_readonly_files:
      - AGENTS.md
      - .agents/skills/si-chip/SKILL.md
      - templates/router_test_matrix.template.yaml
      - .local/dogfood/2026-04-28/round_9/router_floor_report.yaml
      - .local/dogfood/2026-04-28/round_9/metrics_report.yaml
      - .local/dogfood/2026-04-28/round_3/raw/nines_self_eval_out/self_eval_report.txt
    expected_iteration_delta_axes:
      - generalizability
    acceptance_criteria:
      - "metrics_report.yaml G1_cross_model_pass_matrix non-null (2x2 nested dict at minimum: {composer_2: {trigger_basic: <pass_rate>, near_miss: <pass_rate>}, sonnet_shallow: ...})"
